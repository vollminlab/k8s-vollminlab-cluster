name: Secret Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: vollminlab
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan commits for secrets
        run: |
          set -euo pipefail

          # Determine the commit range to scan
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              # First push to branch — scan from the root commit
              BEFORE="$(git rev-list --max-parents=0 HEAD | tail -1)"
            fi
            LOG_OPTS="$BEFORE..${{ github.sha }}"
          fi

          echo "Scanning commits: $LOG_OPTS"

          cat > .gitleaks.toml << 'GITLEAKS_CFG'
          [extend]
          useDefault = true

          [allowlist]
          description = "Allow certificates, public keys, and SealedSecret ciphertext files"
          # SealedSecret files contain kubeseal-encrypted ciphertext — not plain secrets
          paths = [
            '''.*-sealedsecret\.yaml''',
            '''pub-cert\.pem'''
          ]
          regexes = [
            # PEM headers that appear in kubeseal output and sealing certs
            '''-----BEGIN CERTIFICATE-----''',
            '''-----BEGIN PUBLIC KEY-----'''
          ]
          # K8s secretKeyRef key names that match generic-api-key pattern but are not secrets
          stopwords = [
            "B2_APPLICATION_KEY_ID",
            "B2_APPLICATION_KEY"
          ]
          GITLEAKS_CFG

          gitleaks detect \
            --config .gitleaks.toml \
            --log-opts "$LOG_OPTS" \
            --no-banner \
            --exit-code 1 || {
              echo ""
              echo "❌ Secrets detected in commits."
              echo "   Never commit plain API keys, passwords, or tokens."
              echo "   Use SealedSecrets for Kubernetes secrets."
              echo "   Store credentials in 1Password (Homelab vault)."
              exit 1
            }

          echo "✅ No secrets detected"
