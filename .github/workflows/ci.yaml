name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'clusters/**'
      - 'bootstrap/**'
      - 'terraform/**'
      - '.github/workflows/**'
      - '.vscode/**'
      - 'scripts/**'
      - '.claude/**'
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'renovate.json'
      - '.pre-commit-config.yaml'
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'clusters/**'
      - 'bootstrap/**'
      - 'terraform/**'
      - '.github/workflows/**'
      - '.vscode/**'
      - 'scripts/**'
      - '.claude/**'
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'renovate.json'
      - '.pre-commit-config.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

defaults:
  run:
    shell: bash

env:
  KUBERNETES_VERSION: "1.34.8"
  RUN_SUFFIX: ${{ github.run_id }}-${{ github.run_number }}
  TRIVY_CACHE_DIR: /tmp/trivy-cache

jobs:
  validate-changes:
    # timeout raised 5 â†’ 10 after canary #964: first-run tool installs on a
    # fresh runner can exceed 5 minutes
    name: Validate Kubernetes Manifests
    runs-on: vollminlab
    timeout-minutes: 10
    outputs:
      changed: ${{ steps.get-changed-files.outputs.changed }}
      changed_files: ${{ steps.get-changed-files.outputs.changed_files }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install kubectl
        run: |
          set -euo pipefail
          echo "đź“¦ Installing kubectl..."
          KUBECTL_VERSION="v${{ env.KUBERNETES_VERSION }}"
          
          # Try multiple methods to install kubectl
          if command -v kubectl >/dev/null 2>&1; then
            echo "âś… kubectl already installed"
            kubectl version --client
          else
            echo "đź”„ Downloading kubectl..."
            # Try with retries and different mirrors
            for i in {1..3}; do
              if curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"; then
                echo "âś… kubectl downloaded successfully"
                break
              else
                echo "âš ď¸Ź Attempt $i failed, retrying..."
                sleep 2
              fi
            done
            
            if [[ ! -f kubectl ]]; then
              echo "âťŚ Failed to download kubectl after 3 attempts"
              exit 1
            fi
            
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
            kubectl version --client
          fi

      - name: Install yq
        run: |
          set -euo pipefail
          echo "đź“¦ Installing yq..."
          sudo curl -L -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Get changed files
        id: get-changed-files
        run: |
          set -euo pipefail
          echo "đź”Ť Finding changed files..."
          
          # Determine the base ref for comparison
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # For PRs, compare against the base branch (e.g., main)
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            echo "đź“‹ PR Mode: Comparing $HEAD_SHA against base $BASE_SHA"
          else
            # For pushes, use the before SHA
            BASE_SHA="${{ github.event.before }}"
            if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              # First push to branch or force push - compare against HEAD~1
              BASE_SHA="HEAD~1"
            fi
            HEAD_SHA="HEAD"
            echo "đź“‹ Push Mode: Comparing $HEAD_SHA against $BASE_SHA"
          fi
          
          # All changed YAML files, then scoped subsets
          CHANGED_YAML=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '\.(yaml|yml)$' || echo "")

          # Lint scope: clusters/ + bootstrap/ (bootstrap is in the workflow
          # triggers but was previously filtered out and never validated)
          LINT_FILES=$(printf '%s\n' "$CHANGED_YAML" | grep -E '^(clusters|bootstrap)/' || echo "")

          # Deploy scope: clusters/ only
          DIRECT_FILES=$(printf '%s\n' "$CHANGED_YAML" | grep '^clusters/' || echo "")

          echo "đź”Ť All changed files in this PR/push:"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true

          # Expand each changed file to its full app unit (the .../app/ directory).
          # A HelmRelease renders together with its sibling values ConfigMap, so
          # changing one without the other must still test the pair (PR #960: a
          # configmap.yaml-only change broke the Harbor Helm upgrade untested).
          EXPANDED=""
          if [[ -n "$DIRECT_FILES" ]]; then
            EXPANDED=$(
              printf '%s\n' "$DIRECT_FILES" | while IFS= read -r f; do
                echo "$f"
                if [[ "$f" == */app/* ]]; then
                  UNIT="${f%%/app/*}/app"
                  [[ -d "$UNIT" ]] && find "$UNIT" -maxdepth 1 \( -name '*.yaml' -o -name '*.yml' \)
                fi
              done | sort -u
            )
          fi

          # Pull in the source repository file for any HelmRelease in scope, so
          # the chart source can be validated even when only the HR changed
          REPO_FILES=""
          if [[ -n "$EXPANDED" ]]; then
            REPO_FILES=$(
              printf '%s\n' "$EXPANDED" | while IFS= read -r f; do
                [[ -f "$f" ]] || continue
                yq eval '.kind' "$f" 2>/dev/null | grep -qi '^HelmRelease$' || continue
                SRC_NAME=$(yq eval '.spec.chartRef.name // .spec.chart.spec.sourceRef.name // ""' "$f")
                [[ -n "$SRC_NAME" ]] || continue
                for rf in clusters/vollminlab-cluster/flux-system/repositories/*.yaml; do
                  if [[ "$(yq eval '.metadata.name' "$rf" 2>/dev/null)" == "$SRC_NAME" ]]; then
                    echo "$rf"
                  fi
                done
              done | sort -u
            )
          fi

          CHANGED_FILES=$(printf '%s\n%s\n' "$EXPANDED" "$REPO_FILES" | sed '/^$/d' | sort -u)

          echo ""
          echo "đź”Ť Files in validation scope (changed + app-unit closure):"
          if [[ -n "$CHANGED_FILES" ]]; then
            printf '%s\n' "$CHANGED_FILES"
          else
            echo "(none)"
          fi

          {
            echo "LINT_FILES<<EOF"
            printf '%s\n' "$LINT_FILES"
            echo "EOF"
          } >> $GITHUB_ENV

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "âś… No YAML files changed in clusters directory"
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "CHANGED_FILES=" >> $GITHUB_ENV
          else
            echo "đź“‹ Found changed cluster files - will run deployment validation"
            echo "changed=true" >> $GITHUB_OUTPUT
            {
              echo "changed_files<<EOF"
              printf '%s\n' "$CHANGED_FILES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            {
              echo "CHANGED_FILES<<EOF"
              printf '%s\n' "$CHANGED_FILES"
              echo "EOF"
            } >> $GITHUB_ENV
          fi

      - name: Validate YAML syntax
        if: env.LINT_FILES != ''
        run: |
          set -euo pipefail
          echo "đź”Ť Validating YAML syntax with yamllint..."

          # ARC runners are ephemeral pods â€” nothing persists between runs, so
          # yamllint must be installed every time. apt-get hung after fetching
          # package lists on two consecutive runs (canary PR #964), eating the
          # whole job timeout, so install via pip instead. The runner image
          # ships python3 without pip/ensurepip, hence the get-pip bootstrap.
          # timeout guards make a hung download fail fast instead of stalling
          # the job to its timeout.
          timeout 90 curl -sSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
          timeout 90 python3 /tmp/get-pip.py --user --break-system-packages --quiet
          timeout 90 python3 -m pip install --user --break-system-packages --quiet yamllint
          export PATH="$HOME/.local/bin:$PATH"
          yamllint --version

          # Create yamllint config for Kubernetes files
          cat > .yamllint << 'EOF'
          extends: default

          rules:
            document-start:
              present: false
            new-line-at-end-of-file:
              level: warning
            line-length:
              max: 200
            truthy:
              allowed-values: ['true', 'false', 'on', 'off']
          EOF

          # Lint every changed YAML file in clusters/ + bootstrap/
          printf '%s\n' "$LINT_FILES" | while IFS= read -r file; do
            if [[ -f "$file" ]]; then
              # gotk-components.yaml is generated by flux (DO NOT EDIT) and uses
              # block-sequence indentation that yamllint rejects â€” skip it.
              if [[ "$file" == *"gotk-components.yaml" ]]; then
                echo "  Skipping generated file: $file"
                continue
              fi

              echo "Validating: $file"
              yamllint "$file" || {
                echo "âťŚ YAML lint error in $file"
                exit 1
              }
            fi
          done

          echo "âś… All YAML files have valid syntax"

      - name: Validate Kubernetes schemas
        if: env.LINT_FILES != ''
        run: |
          set -euo pipefail
          echo "đź”Ť Validating Kubernetes schemas with kubeconform..."

          # Install kubeconform
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xvzf -
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

          # Validate each changed Kubernetes file. CRD schemas (Flux, Kyverno,
          # cert-manager, ESO, etc.) come from the datreeio CRDs-catalog â€” these
          # kinds were previously skipped entirely and never schema-checked.
          printf '%s\n' "$LINT_FILES" | while IFS= read -r file; do
            if [[ -f "$file" ]] && grep -q "kind:" "$file" && grep -q "apiVersion:" "$file"; then
              echo "Validating schema for CHANGED file: $file"
              timeout 30s kubeconform -strict -ignore-missing-schemas \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                -summary "$file" || {
                EXIT_CODE=$?
                if [[ $EXIT_CODE -eq 124 ]]; then
                  echo "âťŚ Kubernetes schema validation TIMED OUT for CHANGED file: $file (exceeded 30s)"
                else
                  echo "âťŚ Kubernetes schema validation failed for CHANGED file: $file"
                fi
                exit 1
              }
            fi
          done

          echo "âś… All Kubernetes resources have valid schemas"

      - name: Scan for secrets (fast file-content check)
        if: env.LINT_FILES != '' || env.CHANGED_FILES != ''
        run: |
          set -euo pipefail
          echo "đź”Ť Scanning changed files for secrets..."

          # Install gitleaks
          curl -sL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              BEFORE="$(git rev-list --max-parents=0 HEAD | tail -1)"
            fi
            LOG_OPTS="$BEFORE..${{ github.sha }}"
          fi

          cat > .gitleaks.toml << 'GITLEAKS_CFG'
          [extend]
          useDefault = true

          [allowlist]
          description = "Allow certificates, public keys, and SealedSecret ciphertext files"
          paths = [
            '''.*-sealedsecret\.yaml''',
            '''pub-cert\.pem'''
          ]
          regexes = [
            '''-----BEGIN CERTIFICATE-----''',
            '''-----BEGIN PUBLIC KEY-----'''
          ]
          # K8s secretKeyRef key names that match generic-api-key pattern but are not secrets
          stopwords = [
            "B2_APPLICATION_KEY_ID",
            "B2_APPLICATION_KEY"
          ]
          GITLEAKS_CFG

          gitleaks detect \
            --config .gitleaks.toml \
            --log-opts "$LOG_OPTS" \
            --no-banner \
            --exit-code 1 || {
              echo "âťŚ Secrets detected. Never commit plain API keys or passwords."
              echo "Use ExternalSecrets (ESO + 1Password); store credentials in 1Password."
              exit 1
            }

          echo "âś… No secrets detected in changed files"

  integration-test:
    name: Integration Test
    runs-on: vollminlab
    needs: [validate-changes]
    if: needs.validate-changes.result == 'success'
    env:
      CHANGED_FILES: ${{ needs.validate-changes.outputs.changed_files }}
    steps:
      - name: Skip when no cluster files changed
        if: needs.validate-changes.outputs.changed != 'true'
        run: echo "No cluster YAML changed; job succeeds." && exit 0
      - name: Checkout code
        if: needs.validate-changes.outputs.changed == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup kubectl
        if: needs.validate-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          KUBECTL_VERSION="v${{ env.KUBERNETES_VERSION }}"
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Install yq
        if: needs.validate-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "đź“¦ Installing yq..."
          sudo curl -L -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install Helm
        if: needs.validate-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "đź“¦ Installing Helm..."
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Render charts and check post-render (static)
        if: needs.validate-changes.outputs.changed == 'true'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail
          echo "đź”Ť Rendering changed HelmReleases with their values ConfigMaps..."
          # This reproduces what helm-controller does before applying: render the
          # chart with the real values, then parse the output strictly. PR #960
          # (duplicate 'app' key in exporter.podLabels) passed every other check
          # and broke the live Harbor upgrade â€” this step catches that class.

          # kustomize's strict go-yaml parser rejects duplicate mapping keys with
          # the same error helm-controller reports; helm template alone does not.
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" | tar xz
          sudo mv kustomize /usr/local/bin/kustomize

          REPO_DIR="clusters/vollminlab-cluster/flux-system/repositories"
          HARBOR_LOGIN_DONE=""
          RENDER_FAILED=0

          while IFS= read -r file; do
            [[ -f "$file" ]] || continue
            [[ "$(yq eval '.kind' "$file" 2>/dev/null)" == "HelmRelease" ]] || continue

            RELEASE_NAME=$(yq eval '.metadata.name' "$file")
            APP_DIR=$(dirname "$file")
            SRC_NAME=$(yq eval '.spec.chartRef.name // .spec.chart.spec.sourceRef.name // ""' "$file")
            if [[ -z "$SRC_NAME" ]]; then
              echo "âťŚ $file: no chartRef.name or chart.spec.sourceRef.name"
              RENDER_FAILED=1
              continue
            fi

            # Locate the source repository file by metadata.name
            SRC_FILE=""
            for rf in "$REPO_DIR"/*.yaml; do
              if [[ "$(yq eval '.metadata.name' "$rf" 2>/dev/null)" == "$SRC_NAME" ]]; then
                SRC_FILE="$rf"
                break
              fi
            done
            if [[ -z "$SRC_FILE" ]]; then
              echo "âťŚ $file: source '$SRC_NAME' not found in $REPO_DIR"
              RENDER_FAILED=1
              continue
            fi
            SRC_KIND=$(yq eval '.kind' "$SRC_FILE")
            SRC_URL=$(yq eval '.spec.url' "$SRC_FILE")

            # Collect values files from valuesFrom (ConfigMaps only â€” Secret
            # values live in the cluster, not the repo; skip with a warning)
            VALUES_ARGS=()
            VF_COUNT=$(yq eval '.spec.valuesFrom | length' "$file")
            [[ "$VF_COUNT" == "null" ]] && VF_COUNT=0
            for ((i=0; i<VF_COUNT; i++)); do
              VF_KIND=$(yq eval ".spec.valuesFrom[$i].kind" "$file")
              VF_NAME=$(yq eval ".spec.valuesFrom[$i].name" "$file")
              VF_KEY=$(yq eval ".spec.valuesFrom[$i].valuesKey // \"values.yaml\"" "$file")
              VF_TARGET=$(yq eval ".spec.valuesFrom[$i].targetPath // \"\"" "$file")
              if [[ "$VF_KIND" != "ConfigMap" ]]; then
                echo "  âš ď¸Ź $RELEASE_NAME: skipping valuesFrom $VF_KIND/$VF_NAME (not in repo)"
                continue
              fi
              if [[ -n "$VF_TARGET" ]]; then
                echo "  âš ď¸Ź $RELEASE_NAME: skipping valuesFrom $VF_NAME (targetPath not supported statically)"
                continue
              fi
              CM_FILE=""
              for cf in "$APP_DIR"/*.yaml; do
                if [[ "$(yq eval '.kind' "$cf" 2>/dev/null)" == "ConfigMap" ]] && \
                   [[ "$(yq eval '.metadata.name' "$cf" 2>/dev/null)" == "$VF_NAME" ]]; then
                  CM_FILE="$cf"
                  break
                fi
              done
              if [[ -z "$CM_FILE" ]]; then
                echo "  âš ď¸Ź $RELEASE_NAME: ConfigMap $VF_NAME not found in $APP_DIR â€” rendering without it"
                continue
              fi
              VF_TMP=$(mktemp)
              yq eval ".data[\"$VF_KEY\"]" "$CM_FILE" > "$VF_TMP"
              VALUES_ARGS+=(-f "$VF_TMP")
            done

            # Harbor OCI login once if needed
            if [[ "$SRC_URL" == oci://harbor.vollminlab.com* && -z "$HARBOR_LOGIN_DONE" ]]; then
              echo "$HARBOR_PASSWORD" | helm registry login harbor.vollminlab.com \
                -u "$HARBOR_USERNAME" --password-stdin
              HARBOR_LOGIN_DONE=1
            fi

            RENDER_DIR=$(mktemp -d)
            echo "  Rendering $RELEASE_NAME (source: $SRC_KIND/$SRC_NAME)..."
            RENDER_OK=1
            if [[ "$SRC_KIND" == "OCIRepository" ]]; then
              CHART_VERSION=$(yq eval '.spec.ref.tag' "$SRC_FILE")
              helm template "$RELEASE_NAME" "$SRC_URL" --version "$CHART_VERSION" \
                ${VALUES_ARGS[@]+"${VALUES_ARGS[@]}"} > "$RENDER_DIR/rendered.yaml" || RENDER_OK=0
            else
              CHART_NAME=$(yq eval '.spec.chart.spec.chart' "$file")
              CHART_VERSION=$(yq eval '.spec.chart.spec.version' "$file")
              if [[ "$SRC_URL" == oci://* ]]; then
                helm template "$RELEASE_NAME" "${SRC_URL}/${CHART_NAME}" --version "$CHART_VERSION" \
                  ${VALUES_ARGS[@]+"${VALUES_ARGS[@]}"} > "$RENDER_DIR/rendered.yaml" || RENDER_OK=0
              else
                helm template "$RELEASE_NAME" "$CHART_NAME" --repo "$SRC_URL" --version "$CHART_VERSION" \
                  ${VALUES_ARGS[@]+"${VALUES_ARGS[@]}"} > "$RENDER_DIR/rendered.yaml" || RENDER_OK=0
              fi
            fi
            if [[ "$RENDER_OK" == "0" ]]; then
              echo "âťŚ helm template failed for $RELEASE_NAME ($file)"
              RENDER_FAILED=1
              continue
            fi

            # Strict-parse the rendered output the way helm-controller does.
            printf 'resources:\n  - rendered.yaml\n' > "$RENDER_DIR/kustomization.yaml"
            if ! kustomize build "$RENDER_DIR" > /dev/null; then
              echo "âťŚ Rendered output of $RELEASE_NAME fails strict YAML parsing."
              echo "   This is the failure mode of PR #960 (duplicate mapping key) â€”"
              echo "   the in-cluster Helm upgrade would fail exactly like this."
              RENDER_FAILED=1
            else
              echo "  âś… $RELEASE_NAME renders and parses cleanly"
            fi
          done <<< "$CHANGED_FILES"

          if [[ "$RENDER_FAILED" != "0" ]]; then
            echo "âťŚ One or more HelmReleases failed static render validation"
            exit 1
          fi
          echo "âś… All changed HelmReleases render and strict-parse cleanly"

      - name: Create test namespace
        if: needs.validate-changes.outputs.changed == 'true'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail
          TEST_NAMESPACE="ci-test-${{ env.RUN_SUFFIX }}"
          echo "TEST_NAMESPACE=$TEST_NAMESPACE" >> $GITHUB_ENV

          # Kyverno mutate policies do apiCall lookups on namespace labels â€”
          # an unlabeled test namespace fails the fail-closed webhook. Labels
          # must be set at creation time: the runner ServiceAccount can create
          # and delete namespaces but not patch them, so kubectl label is
          # forbidden.
          kubectl create -f - <<EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: $TEST_NAMESPACE
            labels:
              app: ci-test
              env: production
              category: core
          EOF
          echo "âś… Created test namespace: $TEST_NAMESPACE"

          # Pre-create Harbor pull secret so OCIRepositories with secretRef can authenticate.
          # Secrets passed via env: to avoid shell expanding $ in the robot username.
          kubectl create secret docker-registry harbor-vollminlab-pull \
            -n "$TEST_NAMESPACE" \
            --docker-server=harbor.vollminlab.com \
            --docker-username="$HARBOR_USERNAME" \
            --docker-password="$HARBOR_PASSWORD"
          echo "âś… Created harbor-vollminlab-pull secret in $TEST_NAMESPACE"

      - name: Check Flux CRDs
        if: needs.validate-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "đź”Ť Checking Flux CRDs availability..."
          
          # Check by listing resources, not CRDs â€” the runner SA can list Flux resources
          # but does not have permission to list customresourcedefinitions cluster-wide.
          if ! kubectl get ocirepositories.source.toolkit.fluxcd.io -A --no-headers >/dev/null 2>&1; then
            echo "âš ď¸Ź OCIRepository resource type not accessible - skipping Flux resource testing"
            echo "FLUX_CRDS_AVAILABLE=false" >> $GITHUB_ENV
            exit 0
          fi

          if ! kubectl get helmreleases.helm.toolkit.fluxcd.io -A --no-headers >/dev/null 2>&1; then
            echo "âš ď¸Ź HelmRelease resource type not accessible - skipping Flux resource testing"
            echo "FLUX_CRDS_AVAILABLE=false" >> $GITHUB_ENV
            # Don't exit - continue with basic validation
          else
            echo "âś… Flux CRDs are available"
            echo "FLUX_CRDS_AVAILABLE=true" >> $GITHUB_ENV
          fi

      - name: Test deploy changed resources
        if: needs.validate-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          TEST_NAMESPACE="$TEST_NAMESPACE"
          RUN_SUFFIX="${{ env.RUN_SUFFIX }}"
          
          echo "đź”Ť Test deploying changed resources..."
          
          # CHANGED_FILES comes from the validate-changes job (includes the
          # app-unit closure) â€” no local re-derivation, one source of truth
          if [[ -z "$CHANGED_FILES" ]]; then
            echo "âś… No resources to test deploy"
            exit 0
          fi

          echo "Changed files: $CHANGED_FILES"
          
          # Create OCI mapping file for Flux resources
          OCI_MAPPING_FILE="/tmp/oci-mapping-$RUN_SUFFIX.txt"
          touch "$OCI_MAPPING_FILE"
          
          # First pass: Deploy OCIRepositories
          for file in $CHANGED_FILES; do
            if [[ -f "$file" ]] && yq eval '.kind' "$file" | grep -qi '^OCIRepository$'; then
              echo "Test deploying OCIRepository: $file"

              ORIG_NAME=$(yq eval '.metadata.name' "$file")
              TEST_NAME="test-${ORIG_NAME}-${RUN_SUFFIX}"

              echo "$ORIG_NAME:$TEST_NAME" >> "$OCI_MAPPING_FILE"

              APPLY_OUTPUT=$(yq eval "
                .metadata.namespace = \"$TEST_NAMESPACE\" |
                  .metadata.name = \"$TEST_NAME\"
              " "$file" | kubectl apply --validate=false -f - 2>&1) || {
                echo "âťŚ Failed to deploy OCIRepository: $file"
                echo "$APPLY_OUTPUT"
                exit 1
              }
            fi
          done
          
          # Deploy HelmRepositories (needed for HelmReleases)
          for file in $CHANGED_FILES; do
            if [[ -f "$file" ]] && yq eval '.kind' "$file" | grep -qi '^HelmRelease$'; then
              # Find the HelmRepository this HelmRelease references
              if [[ "$(yq eval '.spec.chartRef // ""' "$file")" != "" ]]; then
                SOURCE_REF="$(yq eval '.spec.chartRef.name' "$file")"
                SOURCE_NAMESPACE="$(yq eval '.spec.chartRef.namespace // "flux-system"' "$file")"
              else
                SOURCE_REF="$(yq eval '.spec.chart.spec.sourceRef.name' "$file")"
                SOURCE_NAMESPACE="$(yq eval '.spec.chart.spec.sourceRef.namespace // "flux-system"' "$file")"
              fi
              
              if [[ -n "$SOURCE_REF" ]]; then
                echo "Looking for HelmRepository: $SOURCE_REF in namespace: $SOURCE_NAMESPACE"

                # Check if the HelmRepository itself was changed in this PR â€” prefer file over cluster
                # This handles type changes (e.g. OCIâ†’HTTP) and brand-new repositories
                CHANGED_REPO_FILE=""
                for cf in $CHANGED_FILES; do
                  if [[ -f "$cf" ]] && yq eval '.kind' "$cf" 2>/dev/null | grep -qi '^HelmRepository$'; then
                    FILE_REPO_NAME=$(yq eval '.metadata.name' "$cf" 2>/dev/null || echo "")
                    if [[ "$FILE_REPO_NAME" == "$SOURCE_REF" ]]; then
                      CHANGED_REPO_FILE="$cf"
                      break
                    fi
                  fi
                done

                # If the source was already deployed as an OCIRepository in the first pass,
                # skip HelmRepository validation â€” the OCIRepository sync wait loop handles it.
                if grep -q "^${SOURCE_REF}:" "$OCI_MAPPING_FILE" 2>/dev/null; then
                  echo "â„ąď¸Ź $SOURCE_REF was deployed as OCIRepository in first pass â€” skipping HelmRepository lookup"
                  continue
                fi

                # Check if HelmRepository exists in source namespace OR was changed in this PR
                if kubectl get helmrepository "$SOURCE_REF" -n "$SOURCE_NAMESPACE" >/dev/null 2>&1 || [[ -n "$CHANGED_REPO_FILE" ]]; then
                  # OCI-type HelmRepositories don't reconcile Ready in ad-hoc test namespaces
                  # (no chart index to fetch; source-controller needs an existing HelmRelease
                  # to trigger the first pull). Validate directly with helm instead.
                  # Prefer type from the changed file if available (handles OCIâ†’HTTP migrations)
                  if [[ -n "$CHANGED_REPO_FILE" ]]; then
                    REPO_TYPE=$(yq eval '.spec.type // ""' "$CHANGED_REPO_FILE" 2>/dev/null || echo "")
                    echo "đź“ť Using updated HelmRepository type from changed file: $CHANGED_REPO_FILE (type: ${REPO_TYPE:-http})"
                  else
                    REPO_TYPE=$(kubectl get helmrepository "$SOURCE_REF" -n "$SOURCE_NAMESPACE" \
                      -o jsonpath='{.spec.type}' 2>/dev/null || echo "")
                  fi

                  if [[ "$REPO_TYPE" == "oci" ]]; then
                    if [[ -n "$CHANGED_REPO_FILE" ]]; then
                      OCI_URL=$(yq eval '.spec.url' "$CHANGED_REPO_FILE" 2>/dev/null || echo "")
                    else
                      OCI_URL=$(kubectl get helmrepository "$SOURCE_REF" -n "$SOURCE_NAMESPACE" \
                        -o jsonpath='{.spec.url}' 2>/dev/null || echo "")
                    fi
                    CHART_NAME=$(yq eval '.spec.chart.spec.chart' "$file")
                    CHART_VERSION=$(yq eval '.spec.chart.spec.version' "$file")
                    if [[ -n "$OCI_URL" && -n "$CHART_NAME" && -n "$CHART_VERSION" ]]; then
                      echo "đź”Ť Validating OCI chart $CHART_NAME@$CHART_VERSION from $OCI_URL..."
                      helm show chart "${OCI_URL}/${CHART_NAME}" --version "$CHART_VERSION" > /dev/null || {
                        echo "âťŚ Chart $CHART_NAME@$CHART_VERSION not found in OCI registry $OCI_URL"
                        exit 1
                      }
                      echo "âś… OCI chart $CHART_NAME@$CHART_VERSION exists and is accessible"
                    else
                      echo "âš ď¸Ź Could not determine OCI chart details for $SOURCE_REF â€” skipping chart validation"
                    fi
                  else
                    echo "Found HelmRepository: $SOURCE_REF, deploying to test namespace"

                    # Get the HelmRepository and deploy it to test namespace
                    # Prefer the changed file so the test uses the new repo config, not the stale cluster version
                    TEST_NAME="test-${SOURCE_REF}-${RUN_SUFFIX}"
                    if [[ -n "$CHANGED_REPO_FILE" ]]; then
                      echo "đź“ť Deploying updated HelmRepository from changed file: $CHANGED_REPO_FILE"
                      yq eval "
                        .metadata.namespace = \"$TEST_NAMESPACE\" |
                        .metadata.name = \"$TEST_NAME\" |
                        del(.status) |
                        del(.metadata.resourceVersion) |
                        del(.metadata.uid) |
                        del(.metadata.creationTimestamp)
                      " "$CHANGED_REPO_FILE" | kubectl apply -f - || {
                        echo "âťŚ Failed to deploy HelmRepository: $SOURCE_REF"
                        exit 1
                      }
                    else
                      kubectl get helmrepository "$SOURCE_REF" -n "$SOURCE_NAMESPACE" -o yaml | \
                        yq eval "
                          .metadata.namespace = \"$TEST_NAMESPACE\" |
                          .metadata.name = \"$TEST_NAME\" |
                          del(.status) |
                          del(.metadata.resourceVersion) |
                          del(.metadata.uid) |
                          del(.metadata.creationTimestamp)
                        " | kubectl apply -f - || {
                        echo "âťŚ Failed to deploy HelmRepository: $SOURCE_REF"
                        exit 1
                      }
                    fi

                    echo "$SOURCE_REF:$TEST_NAME" >> "$OCI_MAPPING_FILE"
                  fi
                else
                  echo "âš ď¸Ź HelmRepository $SOURCE_REF not found in $SOURCE_NAMESPACE - skipping"
                fi
              fi
            fi
          done
          
          # Export mapping file for HelmRelease step
          echo "OCI_MAPPING_FILE=$OCI_MAPPING_FILE" >> $GITHUB_ENV
          
          # Wait for repositories to sync (OCI and Helm)
          echo "âŹł Waiting for repositories to sync..."
          echo "This may take 1-5 minutes depending on network conditions and registry response time"
          
          # Show initial status
          echo "Current Repository Status:"
          kubectl get ocirepository,helmrepository -n "$TEST_NAMESPACE" -o wide || true
          
          # Wait for repositories to sync with timeout
          echo "Starting repository sync..."
          
          # Use timeout command to ensure we don't wait forever
          timeout 300s bash -c '
            while true; do
              echo "âŹł Checking repository status..."
              kubectl get ocirepository,helmrepository -n "$TEST_NAMESPACE" -o wide || true
              
              # Check if all repositories are ready
              OCI_READY=true
              HELM_READY=true
              
              # Check OCI repositories
              if kubectl get ocirepository -n "$TEST_NAMESPACE" --no-headers 2>/dev/null | grep -q .; then
                if ! kubectl wait --for=condition=Ready --timeout=10s ocirepositories.source.toolkit.fluxcd.io --all -n "$TEST_NAMESPACE" 2>/dev/null; then
                  OCI_READY=false
                fi
              fi
              
              # Check Helm repositories
              if kubectl get helmrepository -n "$TEST_NAMESPACE" --no-headers 2>/dev/null | grep -q .; then
                if ! kubectl wait --for=condition=Ready --timeout=10s helmrepositories.source.toolkit.fluxcd.io --all -n "$TEST_NAMESPACE" 2>/dev/null; then
                  HELM_READY=false
                fi
              fi
              
              if [[ "$OCI_READY" == "true" && "$HELM_READY" == "true" ]]; then
                echo "âś… All repositories are ready"
                exit 0
              fi
              
              # Check for failed conditions - look for any repository with Ready=False or error conditions
              FAILED_REPOS=""
              for repo in $(kubectl get ocirepository -n "$TEST_NAMESPACE" -o name | cut -d/ -f2); do
                # Check if repository has Ready=False condition
                READY_STATUS=$(kubectl get ocirepository "$repo" -n "$TEST_NAMESPACE" -o jsonpath='{.status.conditions[0].status}' 2>/dev/null || echo "")
                READY_REASON=$(kubectl get ocirepository "$repo" -n "$TEST_NAMESPACE" -o jsonpath='{.status.conditions[0].reason}' 2>/dev/null || echo "")
                
                if [[ "$READY_STATUS" == "False" ]] || [[ "$READY_REASON" == *"Failed"* ]] || [[ "$READY_REASON" == *"Error"* ]]; then
                  FAILED_REPOS="$FAILED_REPOS $repo"
                fi
              done
              
              if [[ -n "$FAILED_REPOS" ]]; then
                echo "âťŚ Some OCI repositories have failed: $FAILED_REPOS"
                for repo in $FAILED_REPOS; do
                  echo "--- $repo failure details ---"
                  kubectl describe ocirepository "$repo" -n "$TEST_NAMESPACE" | grep -A 5 -B 5 "Ready\|Failed\|Error" || true
                done
                exit 1
              fi
              
              sleep 30
            done
          ' || {
            echo "âťŚ OCI repositories failed to sync within 5 minutes"
            echo "This indicates that chart versions may not exist or repositories are inaccessible"
            
            # Show detailed status
            echo "OCI Repository Status:"
            kubectl get ocirepository -n "$TEST_NAMESPACE" -o wide
            echo ""
            echo "OCI Repository Details:"
            for repo in $(kubectl get ocirepository -n "$TEST_NAMESPACE" -o name); do
              echo "--- $repo ---"
              kubectl describe "$repo" -n "$TEST_NAMESPACE" | tail -20
            done
            
            echo ""
            echo "đź”Ť Troubleshooting OCI Repository Issues:"
            echo "Common causes:"
            echo "1. Registry temporarily unavailable (oci.trueforge.org, ghcr.io, etc.)"
            echo "2. Chart version/tag does not exist"
            echo "3. Network connectivity issues"
            echo "4. Registry authentication required"
            echo ""
            echo "To resolve:"
            echo "- Check if the registry is accessible: curl -I https://oci.trueforge.org"
            echo "- Verify the chart version exists in the registry"
            echo "- Check if authentication is required"
            echo "- Consider using a different registry or chart version"
            
            exit 1
          }
          
          echo "âś… Changed OCI repositories synced successfully"

          # Deploy supporting namespaced resources (ConfigMaps, ExternalSecrets,
          # Ingresses, ...) BEFORE HelmReleases, with their ORIGINAL names.
          # Renaming them broke valuesFrom resolution: the HelmRelease references
          # the ConfigMap by its real name, so a renamed values ConfigMap meant
          # every HR was tested WITHOUT its values (how PR #960 escaped CI).
          # The per-run namespace already provides isolation between runs.
          for file in $CHANGED_FILES; do
            if [[ -f "$file" ]] && yq eval '.kind' "$file" | grep -q .; then
              KIND=$(yq eval '.kind' "$file")

              # Flux source/release kinds have their own passes
              if [[ "$KIND" == "OCIRepository" || "$KIND" == "HelmRepository" || "$KIND" == "HelmRelease" ]]; then
                continue
              fi

              # Skip cluster-scoped resources and Flux Kustomizations.
              # Also skip kinds that must never be test-applied by the runner SA:
              # Role/RoleBinding (RBAC escalation â€” the SA would need every verb it
              # grants), Policy/PolicyException (Kyverno policy injection/bypass;
              # kyverno-cli validates these statically), Terraform (tf-controller
              # would run real tofu plans), Connector/ClusterSecretStore
              # (cluster-scoped â€” the namespace override has no effect, kubectl
              # would apply them for real).
              case "$KIND" in
                ClusterRole|ClusterRoleBinding|ClusterPolicy|ClusterPolicyReport|CustomResourceDefinition|Namespace|Node|PersistentVolume|StorageClass|ValidatingAdmissionWebhook|MutatingAdmissionWebhook|Kustomization|Role|RoleBinding|Policy|PolicyException|Terraform|Connector|ClusterSecretStore)
                  echo "Skipping $KIND resource: $file"
                  continue
                  ;;
              esac

              echo "Test deploying supporting resource ($KIND, name preserved): $file"
              yq eval ".metadata.namespace = \"$TEST_NAMESPACE\"" "$file" | kubectl apply -f - || {
                echo "âťŚ Failed to deploy: $file"
                exit 1
              }
            fi
          done

          echo "âś… Supporting resources deployed with original names"

      - name: Deploy and validate changed HelmReleases
        if: needs.validate-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "đź”Ť Deploying and validating changed HelmReleases..."
          TEST_NAMESPACE="$TEST_NAMESPACE"
          RUN_SUFFIX="${{ env.RUN_SUFFIX }}"
          
          # Create mapping file if it doesn't exist
          OCI_MAPPING_FILE="/tmp/oci-mapping-$RUN_SUFFIX.txt"
          if [[ ! -f "$OCI_MAPPING_FILE" ]]; then
            touch "$OCI_MAPPING_FILE"
          fi
          
          # Wait for repositories to be ready before deploying HelmReleases
          if [[ "${FLUX_CRDS_AVAILABLE}" == "true" ]]; then
            echo "âŹł Waiting for repositories to be ready..."
            
            # Wait for OCIRepositories if they exist
            if kubectl get ocirepository -n "$TEST_NAMESPACE" --no-headers 2>/dev/null | grep -q .; then
              kubectl wait --for=condition=Ready --timeout=300s ocirepositories.source.toolkit.fluxcd.io --all -n "$TEST_NAMESPACE" || {
                echo "âťŚ OCIRepository sync failed - this would break production deployment"
                echo "đź”Ť Checking OCIRepository status:"
                kubectl get ocirepositories -n "$TEST_NAMESPACE" -o wide
                echo "đź“‹ OCIRepository events:"
                kubectl get events -n "$TEST_NAMESPACE" --field-selector involvedObject.kind=OCIRepository --sort-by='.lastTimestamp' || true
                exit 1
              }
            fi
            
            # Wait for HelmRepositories if they exist
            if kubectl get helmrepository -n "$TEST_NAMESPACE" --no-headers 2>/dev/null | grep -q .; then
              kubectl wait --for=condition=Ready --timeout=300s helmrepositories.source.toolkit.fluxcd.io --all -n "$TEST_NAMESPACE" || {
                echo "âťŚ HelmRepository sync failed - this would break production deployment"
                echo "đź”Ť Checking HelmRepository status:"
                kubectl get helmrepositories -n "$TEST_NAMESPACE" -o wide
                echo "đź“‹ HelmRepository events:"
                kubectl get events -n "$TEST_NAMESPACE" --field-selector involvedObject.kind=HelmRepository --sort-by='.lastTimestamp' || true
                exit 1
              }
            fi
            
            echo "âś… All repositories are ready"
          fi
          
          # Second pass: Deploy HelmReleases with sourceRef mapping
          for file in $CHANGED_FILES; do
            if [[ -f "$file" ]] && yq eval '.kind' "$file" | grep -qi '^HelmRelease$'; then
              if [[ "${FLUX_CRDS_AVAILABLE}" != "true" ]]; then
                echo "Skipping HelmRelease deploy (Flux CRDs unavailable): $file"
                continue
              fi
              echo "Test deploying HelmRelease: $file"

              if [[ "$(yq eval '.spec.chartRef // ""' "$file")" != "" ]]; then
                ORIG_SOURCE_REF="$(yq eval '.spec.chartRef.name' "$file")"
              else
                ORIG_SOURCE_REF="$(yq eval '.spec.chart.spec.sourceRef.name' "$file")"
              fi

              TEST_SOURCE_REF="$(grep "^${ORIG_SOURCE_REF}:" "$OCI_MAPPING_FILE" | cut -d: -f2 || true)"
              [[ -z "$TEST_SOURCE_REF" ]] && TEST_SOURCE_REF="test-${ORIG_SOURCE_REF}-${RUN_SUFFIX}"

              CLEAN_NAME="$(basename "$file" | sed -E 's/\.(ya?ml)$//' | tr '[:upper:]' '[:lower:]' \
                | sed -E 's/[^a-z0-9-]+/-/g;s/-+/-/g;s/^-|-$//g')"

              if [[ "$(yq eval '.spec.chartRef // ""' "$file")" != "" ]]; then
                yq eval "
                  .metadata.namespace = \"$TEST_NAMESPACE\" |
                  .metadata.name = \"test-${CLEAN_NAME}-${RUN_SUFFIX}\" |
                  .spec.chartRef.name = \"$TEST_SOURCE_REF\" |
                  .spec.chartRef.namespace = \"$TEST_NAMESPACE\"
                " "$file" | kubectl apply -f - || { echo "âťŚ Failed: $file"; exit 1; }
              else
                yq eval "
                  .metadata.namespace = \"$TEST_NAMESPACE\" |
                  .metadata.name = \"test-${CLEAN_NAME}-${RUN_SUFFIX}\" |
                  .spec.chart.spec.sourceRef.name = \"$TEST_SOURCE_REF\" |
                  .spec.chart.spec.sourceRef.namespace = \"$TEST_NAMESPACE\"
                " "$file" | kubectl apply -f - || { echo "âťŚ Failed: $file"; exit 1; }
              fi
            fi
          done
          
          # Basic validation that runs even without Flux CRDs
          echo "đź”Ť Running basic HelmRelease validation..."
          for file in $CHANGED_FILES; do
            if [[ -f "$file" ]] && yq eval '.kind' "$file" | grep -qi '^HelmRelease$'; then
              echo "Validating HelmRelease: $file"
              
              # Check for basic syntax issues
              yq eval '.' "$file" > /dev/null || {
                echo "âťŚ Invalid YAML syntax in $file"
                exit 1
              }
              
              # Check for required fields â€” only for chart.spec HRs. chartRef HRs
              # (OCIRepository sources) have no .spec.chart, and yq returns the
              # literal string "null" for missing paths, which passed -z checks
              # with garbage values.
              if [[ "$(yq eval '.spec.chartRef // ""' "$file")" != "" ]]; then
                echo "  chartRef HelmRelease â€” chart/version pinned in OCIRepository, skipping field check"
              else
                CHART_NAME=$(yq eval '.spec.chart.spec.chart' "$file")
                CHART_VERSION=$(yq eval '.spec.chart.spec.version' "$file")
                SOURCE_REF=$(yq eval '.spec.chart.spec.sourceRef.name' "$file")

                if [[ -z "$CHART_NAME" || "$CHART_NAME" == "null" || \
                      -z "$CHART_VERSION" || "$CHART_VERSION" == "null" || \
                      -z "$SOURCE_REF" || "$SOURCE_REF" == "null" ]]; then
                  echo "âťŚ Missing required fields in $file"
                  echo "Chart: $CHART_NAME, Version: $CHART_VERSION, Source: $SOURCE_REF"
                  exit 1
                fi
              fi

              echo "âś… Basic validation passed for $file"
              
              # Try dry-run validation to catch chart version issues
              echo "đź”Ť Testing HelmRelease with dry-run..."
              kubectl apply --dry-run=server -f "$file" || {
                echo "âťŚ HelmRelease dry-run failed for $file"
                echo "This indicates the chart version or configuration is invalid"
                exit 1
              }
              echo "âś… Dry-run validation passed for $file"
            fi
          done
          
          # Validate HelmRelease status after deployment
          if [[ "${FLUX_CRDS_AVAILABLE}" == "true" ]]; then
            echo "đź”Ť Validating HelmRelease status..."
            if kubectl get helmrelease -n "$TEST_NAMESPACE" --no-headers 2>/dev/null | grep -q .; then
              kubectl wait --for=condition=Ready --timeout=300s helmreleases.helm.toolkit.fluxcd.io --all -n "$TEST_NAMESPACE" || {
                echo "âťŚ HelmRelease validation failed - this would break production deployment"
                echo "đź”Ť Checking HelmRelease status:"
                kubectl get helmreleases -n "$TEST_NAMESPACE" -o wide
                echo "đź“‹ HelmRelease events:"
                kubectl get events -n "$TEST_NAMESPACE" --field-selector involvedObject.kind=HelmRelease --sort-by='.lastTimestamp' || true
                echo "đź“‹ Detailed HelmRelease status:"
                kubectl describe helmreleases -n "$TEST_NAMESPACE"
                exit 1
              }
              echo "âś… All HelmReleases are ready and valid"
            else
              echo "âś… No HelmReleases deployed to test namespace (source repo is OCI-type)"
            fi
          fi
          
          # Supporting namespaced resources (ConfigMaps etc.) were deployed with
          # their original names BEFORE the HelmReleases in the previous step, so
          # valuesFrom references resolve and the Ready wait above tests the real
          # chart+values combination.
          echo "âś… Successfully test deployed all changed resources"

      - name: Wait for deployments
        if: needs.validate-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          TEST_NAMESPACE="$TEST_NAMESPACE"
          
          echo "âŹł Waiting for deployments to be ready..."
          kubectl wait --for=condition=available --timeout=300s deployment --all -n "$TEST_NAMESPACE" || {
            echo "âš ď¸Ź Some deployments may not be ready, but continuing..."
          }

      - name: Cleanup test namespace
        if: always() && needs.validate-changes.outputs.changed == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          TEST_NAMESPACE="$TEST_NAMESPACE"
          
          echo "đź§ą Cleaning up test namespace..."
          kubectl delete namespace "$TEST_NAMESPACE" --ignore-not-found=true || {
            echo "âš ď¸Ź Failed to delete namespace (RBAC permissions needed - will be fixed once PR is merged)"
            echo "Namespace $TEST_NAMESPACE will need manual cleanup"
            exit 0
          }
          echo "âś… Cleaned up test namespace: $TEST_NAMESPACE"

  security-scan:
    name: Security Scan
    runs-on: vollminlab
    needs: [validate-changes]
    if: needs.validate-changes.result == 'success'
    timeout-minutes: 15
    # Trivy is informational (uploads to GitHub Security tab). Hard gates are
    # gitleaks (secret-scanning workflow) and Kyverno (policy-validation job).
    # Infrastructure timeouts should not block merges.
    continue-on-error: true
    steps:
      - name: Skip when no cluster files changed
        if: needs.validate-changes.outputs.changed != 'true'
        run: echo "No cluster YAML changed; job succeeds." && exit 0
      - name: Checkout code
        if: needs.validate-changes.outputs.changed == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Trivy
        if: needs.validate-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "đź“¦ Installing Trivy..."
          
          # Check if Trivy is already installed
          if command -v trivy >/dev/null 2>&1; then
            echo "âś… Trivy already installed"
            trivy --version
          else
            echo "đź”„ Downloading Trivy..."
            # Try with retries
            for i in {1..3}; do
              if curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b ~/.local/bin; then
                echo "âś… Trivy installed successfully"
                break
              else
                echo "âš ď¸Ź Attempt $i failed, retrying..."
                sleep 2
              fi
            done
            
            if [[ ! -f ~/.local/bin/trivy ]]; then
              echo "âťŚ Failed to install Trivy after 3 attempts"
              exit 1
            fi
            
            echo "$HOME/.local/bin" >> $GITHUB_PATH
            ~/.local/bin/trivy --version
          fi

      - name: Prepare Trivy cache
        if: needs.validate-changes.outputs.changed == 'true'
        run: mkdir -p "${{ env.TRIVY_CACHE_DIR }}"

      - name: Get changed files for security scan
        if: needs.validate-changes.outputs.changed == 'true'
        id: changed-files-security
        run: |
          set -euo pipefail
          echo "đź”Ť Determining files to scan for security vulnerabilities..."
          
          # Get range for diff
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            RANGE="$BASE_SHA..HEAD"
          else
            BASE_SHA="${{ github.event.before }}"
            if [[ -z "$BASE_SHA" ]]; then
              BASE_SHA="$(git rev-list --max-parents=0 HEAD | tail -1)"
            fi
            RANGE="$BASE_SHA..HEAD"
          fi
          
          # Get changed files that are relevant for security scanning
          CHANGED_FILES=$(git diff --name-only "$RANGE" | grep -E '\.(yaml|yml|json|tf|hcl|dockerfile|Dockerfile)$|^clusters/' | head -20 || true)
          
          if [[ -z "$CHANGED_FILES" ]]; then
            echo "No security-relevant files changed, skipping detailed scan"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Security-relevant files changed:"
          echo "$CHANGED_FILES"
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run optimized Trivy scans
        if: steps.changed-files-security.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "đź”Ť Running optimized Trivy scans with 60-second timeout..."
          
          # Create scan directory with only changed files
          SCAN_DIR=$(mktemp -d)
          echo "${{ steps.changed-files-security.outputs.files }}" | while IFS= read -r file; do
            if [[ -f "$file" ]]; then
              # Create directory structure and copy file
              mkdir -p "$SCAN_DIR/$(dirname "$file")"
              cp "$file" "$SCAN_DIR/$file"
            fi
          done
          
          # Run filesystem scan on changed files only
          echo "Running filesystem scan on changed files..."
          timeout 120 trivy fs \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --cache-dir "${{ env.TRIVY_CACHE_DIR }}" \
            --skip-files "*.log,*.tmp,*.cache,node_modules/*,.git/*" \
            --timeout 60s \
            "$SCAN_DIR" || {
            echo "âš ď¸Ź Trivy filesystem scan timed out or failed"
            echo '{"version": "2.1.0", "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "runs": [{"tool": {"driver": {"name": "Trivy", "version": "timeout"}}, "results": []}]}' > trivy-results.sarif
          }
          
          # Run config scan on changed files only
          echo "Running config scan on changed files..."
          timeout 120 trivy config \
            --format sarif \
            --output trivy-config-results.sarif \
            --severity HIGH,CRITICAL \
            --cache-dir "${{ env.TRIVY_CACHE_DIR }}" \
            --timeout 60s \
            "$SCAN_DIR" || {
            echo "âš ď¸Ź Trivy config scan timed out or failed"
            echo '{"version": "2.1.0", "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "runs": [{"tool": {"driver": {"name": "Trivy", "version": "timeout"}}, "results": []}]}' > trivy-config-results.sarif
          }
          
          # Cleanup
          rm -rf "$SCAN_DIR"
          echo "âś… Trivy scans completed"

      - name: Create empty SARIF files if no changes
        if: steps.changed-files-security.outputs.changed == 'false'
        run: |
          echo "Creating empty SARIF files (no security-relevant changes)"
          echo '{"version": "2.1.0", "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "runs": [{"tool": {"driver": {"name": "Trivy", "version": "no-changes"}}, "results": []}]}' > trivy-results.sarif
          echo '{"version": "2.1.0", "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "runs": [{"tool": {"driver": {"name": "Trivy", "version": "no-changes"}}, "results": []}]}' > trivy-config-results.sarif

      - name: Install GitHub CLI
        if: needs.validate-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "đź“¦ Installing GitHub CLI..."
          # Static release tarball instead of apt â€” apt hangs on these
          # ephemeral ARC runners (same failure mode as the yamllint install,
          # canary PR #964).
          GH_VERSION=2.76.1
          timeout 90 curl -fsSL -o /tmp/gh.tar.gz \
            "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/gh.tar.gz -C /tmp
          sudo mv "/tmp/gh_${GH_VERSION}_linux_amd64/bin/gh" /usr/local/bin/gh
          gh --version

      - name: Upload Trivy SARIF results with retry
        if: needs.validate-changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "đź”„ Uploading SARIF results with retry mechanism..."
          
          # Function to try upload with timeout
          upload_with_timeout() {
            local file=$1
            local category=$2
            local attempt=$3
            
            echo "đź“¤ Attempt $attempt: Uploading $file (category: $category)"
            
            # Use proper ref format for GitHub SARIF API
            local ref="${{ github.ref }}"
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              ref="refs/heads/${{ github.event.pull_request.head.ref }}"
            fi
            
            timeout 60s gh api -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/code-scanning/sarifs" \
              -f "commit_sha=${{ github.sha }}" \
              -f "ref=$ref" \
              -f "sarif=$(cat $file | gzip | base64 -w 0)" || return 1
          }
          
          # Try filesystem SARIF upload with retries
          echo "đź”„ Uploading filesystem SARIF results..."
          for attempt in 1 2 3; do
            if upload_with_timeout "trivy-results.sarif" "trivy-fs" "$attempt"; then
              echo "âś… Filesystem SARIF uploaded successfully on attempt $attempt"
              break
            else
              echo "âš ď¸Ź Filesystem SARIF upload attempt $attempt failed or timed out"
              if [ $attempt -eq 3 ]; then
                echo "âťŚ All filesystem SARIF upload attempts failed, continuing..."
              else
                echo "đź”„ Retrying in 2 seconds..."
                sleep 2
              fi
            fi
          done
          
          # Try IaC SARIF upload with retries
          echo "đź”„ Uploading IaC SARIF results..."
          for attempt in 1 2 3; do
            if upload_with_timeout "trivy-config-results.sarif" "trivy-config" "$attempt"; then
              echo "âś… IaC SARIF uploaded successfully on attempt $attempt"
              break
            else
              echo "âš ď¸Ź IaC SARIF upload attempt $attempt failed or timed out"
              if [ $attempt -eq 3 ]; then
                echo "âťŚ All IaC SARIF upload attempts failed, continuing..."
              else
                echo "đź”„ Retrying in 2 seconds..."
                sleep 2
              fi
            fi
          done
          
          echo "âś… SARIF upload process completed"
        continue-on-error: true

  policy-validation:
    name: Kyverno Policy Validation
    runs-on: vollminlab
    needs: [validate-changes]
    if: needs.validate-changes.result == 'success'
    timeout-minutes: 5
    env:
      CHANGED_FILES: ${{ needs.validate-changes.outputs.changed_files }}
    steps:
      - name: Skip when no cluster files changed
        if: needs.validate-changes.outputs.changed != 'true'
        run: echo "No cluster YAML changed; job succeeds." && exit 0
      - name: Checkout code
        if: needs.validate-changes.outputs.changed == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install kyverno CLI and yq
        if: needs.validate-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "đź“¦ Installing Kyverno CLI..."
          curl -L "https://github.com/kyverno/kyverno/releases/download/v1.12.1/kyverno-cli_v1.12.1_linux_x86_64.tar.gz" -o kyverno.tar.gz
          tar -xzf kyverno.tar.gz
          sudo mv kyverno /usr/local/bin/
          kyverno version
          
          echo "đź“¦ Installing yq..."
          sudo curl -L -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Validate against Kyverno policies
        if: needs.validate-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "đź”Ť Validating resources against Kyverno policies..."

          # CHANGED_FILES comes from the validate-changes job (includes the
          # app-unit closure) â€” no local re-derivation, one source of truth
          if [[ -z "$CHANGED_FILES" ]]; then
            echo "âś… No files to validate against policies"
            exit 0
          fi
          
          # Find policy files by parsing 'kind' for each document (handles multi-doc YAML)
          echo "đź”Ť Searching for Kyverno policy files..."
          # Find policy files and store only the file paths
          POLICY_FILES=()
          while IFS= read -r f; do
            echo "đź“„ Checking policy file: $f"
            # handle single and multi-doc YAMLs
            if yq eval '.kind' "$f" 2>/dev/null | grep -Eq '^(Policy|ClusterPolicy)$'; then
              echo "âś… Found policy: $f"
              POLICY_FILES+=("$f")
            else
              echo "âš ď¸Ź Not a policy file: $f"
            fi
          done < <(git ls-files | grep '/kyverno/.*/policies/.*\.ya\?ml$')
          
          echo "đź“Š Found ${#POLICY_FILES[@]} policy files"
          if (( ${#POLICY_FILES[@]} == 0 )); then
            echo "âš ď¸Ź No Kyverno Policy/ClusterPolicy documents found"
            exit 0
          fi
          
          echo "đź“‹ Policy files to use for validation:"
          for policy in "${POLICY_FILES[@]}"; do
            echo "  - $policy"
          done
          
          # Validate only the changed resource files
          for file in $CHANGED_FILES; do
            [[ -f "$file" ]] || continue
            
            # Skip Flux kinds if policies don't target them
            if yq eval '.kind' "$file" 2>/dev/null | grep -Eq '^(HelmRelease|OCIRepository|Kustomization)$'; then
              echo "Skipping Flux resource (not targeted by policies): $file"
              continue
            fi
            
            # Skip policy files themselves to avoid circular validation
            if [[ "$file" =~ /kyverno/.*/policies/.*\.(yaml|yml)$ ]]; then
              echo "Skipping policy file (avoiding circular validation): $file"
              continue
            fi
            
            echo "Validating: $file"
            
            # Check if file is a valid Kubernetes resource (handle multi-doc YAML)
            if ! yq eval-all '.kind' "$file" 2>/dev/null | grep -qE '^[A-Z]'; then
              echo "âš ď¸Ź Skipping non-Kubernetes resource: $file"
              continue
            fi
            
            # Build policy arguments, skipping policies that require a live cluster:
            #   - apiCall: context (inject-namespace-labels, inject-pod-labels)
            #   - mutate.targets: (mutateExisting policies like force-rescan) â€” these need
            #     a real k8s client to look up/patch existing resources and will error with
            #     "Handler factory requires a client but a nil client was passed" offline.
            args=()
            for p in "${POLICY_FILES[@]}"; do
              if [[ -f "$p" ]]; then
                if grep -q "apiCall:" "$p" 2>/dev/null; then
                  echo "âš ď¸Ź Skipping policy (uses apiCall context - requires live cluster): $p"
                  continue
                fi
                if grep -q "mutateExistingOnPolicyUpdate:" "$p" 2>/dev/null; then
                  echo "âš ď¸Ź Skipping policy (mutateExisting - requires live cluster): $p"
                  continue
                fi
                args+=("$p")
              fi
            done
            
            # Run validation with better error handling
            if [[ ${#args[@]} -gt 0 ]]; then
              # For multi-document YAML files, validate each document separately
              if grep -q '^---$' "$file"; then
                echo "Multi-document YAML detected, validating each document separately"
                
                # Split multi-document YAML and validate each document
                # Use yq to properly split multi-document YAML
                yq eval-all 'select(.kind != null)' "$file" | \
                yq eval-all 'split_doc' - | \
                while IFS= read -r doc; do
                  if [[ -n "$doc" && "$doc" =~ apiVersion: && "$doc" =~ kind: ]]; then
                    KIND=$(echo "$doc" | yq eval '.kind' - 2>/dev/null || echo "unknown")
                    echo "Validating document with kind: $KIND"
                    echo "Running: kyverno apply ${args[*]} --resource -"
                    echo "$doc" | kyverno apply "${args[@]}" --resource - || {
                      echo "âťŚ Policy validation failed for document in $file"
                      echo "đź”Ť Debugging info:"
                      echo "  File: $file"
                      echo "  Document kind: $KIND"
                      echo "  Policy count: ${#args[@]}"
                      echo "  Policy files: ${args[*]}"
                      echo "  Document preview:"
                      echo "$doc" | head -5
                      exit 1
                    }
                  fi
                done
                echo "âś… Validation passed for all documents in $file"
              else
                echo "Single-document YAML detected"
                echo "Running: kyverno apply ${args[*]} --resource \"$file\""
                if ! kyverno apply "${args[@]}" --resource "$file" 2>&1; then
                  echo ""
                  echo "âťŚ Policy validation failed for $file"
                  echo "đź”Ť Debugging info:"
                  echo "  File: $file"
                  echo "  Policy count: ${#args[@]}"
                  echo "  Policy files: ${POLICY_FILES[*]}"
                  echo "  Args: ${args[*]}"
                  echo ""
                  echo "đź”Ť Attempting to identify failing policy by testing individually..."
                  for policy in "${POLICY_FILES[@]}"; do
                    echo "Testing policy: $policy"
                    if grep -q "apiCall:" "$policy" 2>/dev/null; then
                      echo "âš ď¸Ź SKIPPED: $policy (uses apiCall context - requires live cluster)"
                      continue
                    fi
                    OUTPUT=$(kyverno apply "$policy" --resource "$file" 2>&1) || true
                    if echo "$OUTPUT" | grep -qE "fail: [1-9]|error: [1-9]"; then
                      echo "âťŚ FAILED: $policy"
                      echo "$OUTPUT" | grep -E "fail:|error:|warn:" | head -3
                    elif echo "$OUTPUT" | grep -q "require policy"; then
                      echo "âš ď¸Ź SKIPPED: $policy (requires variables)"
                    elif echo "$OUTPUT" | grep -qE "pass: [1-9]|pass: 0, fail: 0"; then
                      echo "âś… PASSED: $policy"
                    else
                      echo "â„ąď¸Ź  NO MATCH: $policy (does not apply to this resource)"
                    fi
                  done
                  exit 1
                else
                  echo "âś… Validation passed for $file"
                fi
              fi
            else
              echo "âš ď¸Ź No valid policy files found for validation"
              exit 1
            fi
          done
          
          echo "âś… All resources comply with Kyverno policies"


  validate-terraform:
    name: Validate Terraform Modules
    runs-on: vollminlab
    needs: [validate-changes]
    if: needs.validate-changes.result == 'success'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect terraform changes
        id: tf-changes
        run: |
          set -euo pipefail
          echo "đź”Ť Checking for changes in terraform/..."

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="$(git rev-list --max-parents=0 HEAD | tail -1)"
            fi
            HEAD_SHA="HEAD"
          fi

          TF_CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep '^terraform/' || echo "")

          if [[ -n "$TF_CHANGED" ]]; then
            echo "đź“‹ Terraform files changed:"
            echo "$TF_CHANGED"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No terraform changes detected; skipping validation"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install OpenTofu
        if: steps.tf-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          if command -v tofu >/dev/null 2>&1; then
            echo "âś… OpenTofu already installed: $(tofu version | head -1)"
          else
            echo "đź“¦ Installing OpenTofu..."
            curl -fsSL https://get.opentofu.org/install-opentofu.sh | sudo sh -s -- --install-method standalone
            tofu version
          fi

      - name: Run tofu fmt -check on all modules
        if: steps.tf-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          fmt_failed=0
          for dir in terraform/*/; do
            if [[ -d "$dir" ]]; then
              echo "đź”Ť Checking fmt: $dir"
              if ! tofu fmt -check -recursive "$dir"; then
                echo "âťŚ fmt check failed: $dir"
                fmt_failed=1
              else
                echo "âś… fmt OK: $dir"
              fi
            fi
          done
          if [[ $fmt_failed -ne 0 ]]; then
            echo "âťŚ One or more modules failed tofu fmt -check. Run 'tofu fmt' to fix."
            exit 1
          fi
          echo "âś… All modules passed fmt check"

      - name: Run tofu init + validate on all modules
        if: steps.tf-changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          for dir in terraform/*/; do
            if [[ -d "$dir" ]]; then
              echo "đź”Ť Validating: $dir"
              (cd "$dir" && tofu init -backend=false -input=false && tofu validate)
              echo "âś… validate OK: $dir"
            fi
          done
          echo "âś… All modules passed tofu validate"

  notify-success:
    name: Notify Success
    runs-on: vollminlab
    needs: [validate-changes, integration-test, security-scan, policy-validation, validate-terraform]
    if: success()
    steps:
      - name: Success notification
        run: |
          set -euo pipefail
          echo "âś… All CI checks passed!"
          echo "đźš€ Ready for deployment"

  notify-failure:
    name: Notify Failure
    runs-on: vollminlab
    needs: [validate-changes, integration-test, security-scan, policy-validation, validate-terraform]
    if: failure()
    steps:
      - name: Failure notification
        run: |
          set -euo pipefail
          echo "âťŚ CI checks failed!"
          echo "đź”§ Please review the failed steps above"