apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
  labels:
    app: metallb
    env: production
    category: networking
spec:
  interval: 5m
  chart:
    spec:
      chart: metallb
      version: 0.16.0
      sourceRef:
        kind: HelmRepository
        name: metallb-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: metallb-values
      valuesKey: values.yaml
