apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: operator-oauth
  namespace: tailscale
  labels:
    app: tailscale-operator
    env: production
    category: networking
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: operator-oauth
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: "Tailscale Operator OAuth Client"
        property: username
    - secretKey: client_secret
      remoteRef:
        key: "Tailscale Operator OAuth Client"
        property: credential
