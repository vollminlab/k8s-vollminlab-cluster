apiVersion: v1
kind: ConfigMap
metadata:
  name: arc-runners-values
  namespace: actions-runner-system
  labels:
    app: arc-runners
    env: production
    category: ci
data:
  values.yaml: |
    githubConfigUrl: "https://github.com/vollminlab"
    githubConfigSecret: arc-githubapp-secret

    runnerScaleSetName: "vollminlab"

    minRunners: 4
    maxRunners: 10

    controllerServiceAccount:
      namespace: arc-controller
      name: arc-controller

    template:
      metadata:
        labels:
          app: arc-runners
          env: production
          category: ci
      spec:
        serviceAccountName: github-actions-runner
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: prometheus
                  namespaces:
                    - monitoring
                  topologyKey: kubernetes.io/hostname
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:2.332.0
            command: ["/home/runner/run.sh"]
            env:
              - name: DOCKER_HOST
                value: tcp://localhost:2375
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 2000m
                memory: 2Gi
          - name: dind
            image: docker:26-dind
            securityContext:
              privileged: true
            env:
              - name: DOCKER_TLS_CERTDIR
                value: ""
            args: ["--host=tcp://0.0.0.0:2375"]
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 2000m
                memory: 2Gi

    listenerTemplate:
      metadata:
        labels:
          app: arc-runners
          env: production
          category: ci
      spec:
        containers:
          - name: listener
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 256Mi
