apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-db-credentials
  namespace: harbor
  labels:
    app: harbor-db
    env: production
    category: storage
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: harbor-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: "Harbor DB"
        property: username
    - secretKey: password
      remoteRef:
        key: "Harbor DB"
        property: password
