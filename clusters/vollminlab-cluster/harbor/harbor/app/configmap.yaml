apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-values
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: storage
data:
  values.yaml: |
    updateStrategy:
      type: Recreate

    externalURL: https://harbor.vollminlab.com

    expose:
      type: loadBalancer
      tls:
        enabled: true
        certSource: secret
        secret:
          secretName: harbor-tls
      loadBalancer:
        IP: ""
        ports:
          httpPort: 80
          httpsPort: 443
        annotations:
          metallb.io/loadBalancerIPs: "192.168.152.245"
          external-dns.alpha.kubernetes.io/hostname: harbor.vollminlab.com
        sourceRanges: []

    existingSecretAdminPassword: harbor-admin-credentials
    existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD

    database:
      type: external
      external:
        host: harbor-db-rw.harbor.svc.cluster.local
        port: "5432"
        username: harbor
        coreDatabase: registry
        existingSecret: harbor-db-credentials
        sslmode: disable

    redis:
      type: internal

    notary:
      enabled: false

    persistence:
      enabled: true
      resourcePolicy: keep
      persistentVolumeClaim:
        registry:
          storageClass: longhorn
          accessMode: ReadWriteOnce
          size: 5Gi
        jobservice:
          jobLog:
            storageClass: longhorn
            accessMode: ReadWriteOnce
            size: 2Gi
        redis:
          storageClass: longhorn
          accessMode: ReadWriteOnce
          size: 2Gi

    registry:
      credentials:
        existingSecret: harbor-core-credentials

    core:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      livenessProbe:
        timeoutSeconds: 5
        failureThreshold: 5
      readinessProbe:
        timeoutSeconds: 5

    jobservice:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      livenessProbe:
        timeoutSeconds: 5
        failureThreshold: 5
      readinessProbe:
        timeoutSeconds: 5

    trivy:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi

    # The exporter deployment template only applies exporter.podLabels — the global
    # podLabels below does not reach it, so the Kyverno-required labels must be set here.
    exporter:
      podLabels:
        app: harbor
        env: production
        category: storage
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

    # Exposes harbor_health / harbor_up (exporter, :8001) and
    # harbor_jobservice_task_total (jobservice) for the harbor alert group in
    # monitoring/kube-prometheus-stack. Prometheus selects all ServiceMonitors
    # (serviceMonitorSelectorNilUsesHelmValues: false), no extra labels needed.
    # Scrape ingress from monitoring ns is already open (allow-monitoring-scrape).
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

    podLabels:
      app: harbor
      env: production
      category: storage
