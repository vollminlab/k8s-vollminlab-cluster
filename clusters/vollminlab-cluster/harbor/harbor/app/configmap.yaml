apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-values
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: storage
data:
  values.yaml: |
    updateStrategy:
      type: Recreate

    externalURL: https://harbor.vollminlab.com

    expose:
      type: loadBalancer
      tls:
        enabled: true
        certSource: secret
        secret:
          secretName: harbor-tls
      loadBalancer:
        IP: ""
        ports:
          httpPort: 80
          httpsPort: 443
        annotations:
          metallb.universe.tf/loadBalancerIPs: "192.168.152.245"
          external-dns.alpha.kubernetes.io/hostname: harbor.vollminlab.com
        sourceRanges: []

    existingSecretAdminPassword: harbor-admin-credentials
    existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD

    database:
      type: external
      external:
        host: harbor-db-rw.harbor.svc.cluster.local
        port: "5432"
        username: harbor
        coreDatabase: registry
        existingSecret: harbor-db-credentials
        sslmode: disable

    redis:
      type: internal

    notary:
      enabled: false

    persistence:
      enabled: true
      resourcePolicy: keep
      persistentVolumeClaim:
        registry:
          storageClass: longhorn
          accessMode: ReadWriteOnce
          size: 5Gi
        jobservice:
          jobLog:
            storageClass: longhorn
            accessMode: ReadWriteOnce
            size: 2Gi
        redis:
          storageClass: longhorn
          accessMode: ReadWriteOnce
          size: 2Gi

    registry:
      credentials:
        existingSecret: harbor-core-credentials

    trivy:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi

    podLabels:
      app: harbor
      env: production
      category: storage
