apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-admin-credentials
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: harbor-admin-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        HARBOR_ADMIN_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: "Harbor Admin"
