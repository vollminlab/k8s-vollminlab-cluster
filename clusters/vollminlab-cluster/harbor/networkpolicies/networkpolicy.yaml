---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow pods within harbor to communicate (core↔db, jobservice↔redis, etc.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Allow external access via LoadBalancer (192.168.152.245). Harbor has no Ingress resource
# — all traffic enters through the LoadBalancer. externalTrafficPolicy: Cluster means kube-proxy
# SNATs external clients to the node IP, so source appears as 192.168.152.0/24 at the pod.
# Harbor nginx container ports are 8080 (HTTP) and 8443 (HTTPS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-loadbalancer-ingress
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 192.168.152.0/24
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
---
# Allow CNPG operator (cnpg-system) to manage harbor-db
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-operator
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 5432
---
# Allow Prometheus scraping from monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
---
# Allow GitHub ARC runners to push images (CI/CD)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-arc-runners
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: actions-runner-system
      ports:
        - protocol: TCP
          port: 8443
---
# Allow egress to Kubernetes API server
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-api-egress
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 6443
---
# Allow egress to MinIO for CNPG database backups (harbor-db → minio S3)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-minio-egress
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio
      ports:
        - protocol: TCP
          port: 9000
---
# Allow external HTTPS egress (proxy cache pulls from docker.io, ghcr.io, quay.io)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: harbor
  labels:
    app: harbor
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
