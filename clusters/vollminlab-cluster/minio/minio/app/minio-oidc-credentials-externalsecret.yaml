apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-oidc-credentials
  namespace: minio
  labels:
    app: minio
    env: production
    category: storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: minio-oidc-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        MINIO_IDENTITY_OPENID_CLIENT_SECRET: "{{ .client_secret }}"
  dataFrom:
    - extract:
        key: "MinIO OIDC Credentials"
