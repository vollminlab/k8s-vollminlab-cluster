apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tofu-minio-user
  namespace: minio
  labels:
    app: minio
    env: production
    category: storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: tofu-minio-user
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        secretKey: "{{ .secret_key }}"
  dataFrom:
    - extract:
        key: "Tofu MinIO User"
