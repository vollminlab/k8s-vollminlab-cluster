apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vollminlab-custom-rules
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    env: production
    category: observability
    release: kube-prometheus-stack
spec:
  groups:
    # Pre-aggregate high-cardinality control-plane histograms.
    # Raw series are retained for ~2h (head block); aggregates carry the long-term signal.
    # Drops: instance, scope, subresource, component, group, version — keeps verb+resource+le.
    - name: apiserver.recording.rules
      interval: 5m
      rules:
        - record: verb_resource:apiserver_request_duration_seconds_bucket:rate5m
          expr: |
            sum without (instance, scope, subresource, component, group, version) (
              rate(apiserver_request_duration_seconds_bucket{job="apiserver"}[5m])
            )

        - record: verb_resource:apiserver_request_sli_duration_seconds_bucket:rate5m
          expr: |
            sum without (instance, scope, subresource, component, group, version) (
              rate(apiserver_request_sli_duration_seconds_bucket{job="apiserver"}[5m])
            )

        - record: verb_resource:apiserver_watch_list_duration_seconds_bucket:rate5m
          expr: |
            sum without (instance, component, group, version) (
              rate(apiserver_watch_list_duration_seconds_bucket{job="apiserver"}[5m])
            )

    - name: etcd.recording.rules
      interval: 5m
      rules:
        - record: operation_type:etcd_request_duration_seconds_bucket:rate5m
          expr: |
            sum without (instance, grpc_service, grpc_method) (
              rate(etcd_request_duration_seconds_bucket{job="kube-etcd"}[5m])
            )

    - name: cert-manager
      rules:
        - alert: CertManagerCertificateExpiringSoon
          expr: |
            certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 24 * 3600
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.name }} in {{ $labels.namespace }} expires soon"
            description: "Certificate {{ $labels.name }} (namespace {{ $labels.namespace }}) expires in {{ $value | humanizeDuration }}."

        - alert: CertManagerCertificateExpiringCritical
          expr: |
            certmanager_certificate_expiration_timestamp_seconds - time() < 24 * 3600
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Certificate {{ $labels.name }} in {{ $labels.namespace }} expires in < 24 hours"
            description: "Certificate {{ $labels.name }} (namespace {{ $labels.namespace }}) expires in {{ $value | humanizeDuration }}. Immediate action required."

    - name: velero
      rules:
        # velero_backup_last_successful_timestamp is a stable gauge — immune to pod restarts.
        # increase(velero_backup_attempt_total[26h]) was used previously but fires false positives
        # after any Velero pod restart (counter resets to 0, increase() returns 0 for the window).
        # This alert also covers Failed/PartiallyFailed runs, not just missing ones: the
        # timestamp only advances on a fully-Completed backup, so any bad nightly run leaves
        # it stale and this fires ~2h after the failed 03:00 run. It self-resolves on the
        # next Completed backup. There is deliberately no separate PartiallyFailed alert —
        # the old increase(velero_backup_partial_failure_total[26h]) form kept firing for a
        # full 26h after one bad run even when a later run succeeded, and there is no
        # per-run gauge to key on instead (velero_backup_last_status reports 1 for
        # PartiallyFailed — verified live 2026-07-19).
        - alert: VeleroBackupNotSucceeding
          expr: |
            time() - velero_backup_last_successful_timestamp{schedule="velero-daily-full"} > 26 * 3600
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Velero daily-full has had no successful backup in 26 hours"
            description: >-
              Last fully-successful daily-full backup was {{ $value | humanizeDuration }} ago —
              the nightly run failed, partially failed, or never ran. Check 'velero backup get'.
              Resolves on the next Completed backup.

        # last_status is 0 only when the most recent backup outright Failed (PartiallyFailed
        # reports 1). Gauge-based, so it resolves as soon as any later run does better —
        # unlike a counter increase() lookback, it never keeps alerting after recovery.
        - alert: VeleroBackupFailed
          expr: |
            velero_backup_last_status{schedule="velero-daily-full"} == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Velero daily-full backup failed"
            description: "The most recent daily-full backup Failed outright. Check 'velero backup get'. Resolves on the next non-Failed run."

        # Escalation guard. VeleroBackupNotSucceeding/VeleroBackupFailed are warnings that can be
        # tolerated for days — on 2026-07-02 a wedged InProgress backup left daily-full
        # PartiallyFailed for 4 days, silently pinning kopia blocks (maintenance can't GC an
        # in-use snapshot) until MinIO hit 100%. This fires critical when NO fully-successful
        # daily-full has completed in 72h, forcing action before a stuck/degraded backup fills
        # the volume. Reuses the restart-immune velero_backup_last_successful_timestamp gauge.
        - alert: VeleroBackupPersistentlyFailing
          expr: |
            time() - velero_backup_last_successful_timestamp{schedule="velero-daily-full"} > 72 * 3600
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "Velero daily-full has had no successful backup in 72 hours"
            description: >-
              Last fully-successful daily-full backup was {{ $value | humanizeDuration }}
              ago — a backup may be wedged InProgress or repeatedly PartiallyFailed. A
              stuck backup blocks kopia GC and will fill MinIO. Check 'velero backup get'
              and repo maintenance.

        # Same escalation guard for the off-site daily-b2 schedule. daily-b2 shares the
        # same failure surface (a wedged/PartiallyFailed backup pins kopia blocks the B2
        # repo's full maintenance can't GC) — it just fills Backblaze instead of MinIO,
        # and leaves the retention tier stale. daily-b2 has its own 72h guard because a
        # per-schedule threshold is required: monthly-b2 legitimately runs monthly, so it
        # can't share this alert (its last-success age exceeds 72h by design).
        - alert: VeleroB2BackupPersistentlyFailing
          expr: |
            time() - velero_backup_last_successful_timestamp{schedule="velero-daily-b2"} > 72 * 3600
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "Velero daily-b2 has had no successful backup in 72 hours"
            description: >-
              Last fully-successful daily-b2 (off-site Backblaze) backup was
              {{ $value | humanizeDuration }} ago — a backup may be wedged InProgress or
              repeatedly PartiallyFailed, pinning kopia blocks in B2 and leaving the
              off-site retention tier stale. Check 'velero backup get' and repo maintenance.

        - alert: KubeJobFailed
          expr: |
            (kube_job_failed{namespace!="velero"} > 0)
              or
            (kube_job_failed{namespace="velero", job_name!~".*-kopia-maintain.*"} > 0)
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed to complete"
            description: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed. Removing failed job after investigation should clear this alert."

        - alert: VeleroBackupMetricMissing
          expr: |
            absent(velero_backup_last_status{schedule="velero-daily-full"}) == 1
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "Velero daily-full backup metric absent — Velero may not be running"
            description: "velero_backup_last_status for schedule=velero-daily-full is missing. Velero may be down or metrics scraping has failed."

    - name: node-disk
      rules:
        - alert: NodeDiskSpaceLow
          expr: |
            (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
              / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}) < 0.20
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} root disk below 20% free"
            description: "Node {{ $labels.instance }} has {{ $value | humanizePercentage }} free on root filesystem. Check with: df -h on the node."

        - alert: NodeDiskSpaceCritical
          expr: |
            (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
              / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}) < 0.10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} root disk below 10% free"
            description: "Node {{ $labels.instance }} has {{ $value | humanizePercentage }} free on root filesystem. Immediate action required."

    - name: pod-health
      rules:
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace!~"trivy-system|velero"}[30m]) > 3
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value | printf \"%.0f\" }} times in the last 30 minutes."

        # Escalated sibling of PodCrashLooping, scoped to the namespaces the longhorn-mount-healer
        # CronJob (kube-system) covers. The healer runs */10 and clears a stale Longhorn mount via
        # scale-0 -> wait-detached -> scale-up within ~10-20m; a fresh pod after a heal resets this
        # counter. A crashloop still accruing restarts an hour later means the automated cure did
        # not take -- a detach timeout (HealedStaleMountTimeout) or the healer's 6h per-workload
        # cooldown suppressing what is actually an application bug. Either way a human is needed.
        # NOTE: keep this namespace regex in sync with the healer's HEAL_NAMESPACES allowlist
        # (clusters/vollminlab-cluster/kube-system/longhorn-mount-healer/app/heal.sh).
        - alert: StorageHealerNotCoping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace=~"mediastack|monitoring|harbor"}[1h]) > 6
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "Self-healer not coping: {{ $labels.namespace }}/{{ $labels.pod }} still crash-looping"
            description: >-
              Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }}
              has restarted {{ $value | printf "%.0f" }} times in the last hour and is still
              crash-looping past the longhorn-mount-healer window. The automated scale-0 ->
              wait-detached -> scale-up cure has not resolved it. Check
              `kubectl get events -n {{ $labels.namespace }} --field-selector reason=HealedStaleMountTimeout`
              (the healer emits this in the affected namespace) and the healer CronJob logs
              (`kubectl logs -n kube-system -l app=longhorn-mount-healer --tail=100`); if it
              is a stale Longhorn mount, run the manual runbook (scale the Deployment to 0,
              wait for the Longhorn volume to report detached, scale it back up).

        # Escalated sibling of PodCrashLooping for user-facing namespaces: a crashloop
        # still accruing restarts after 30 minutes there is an outage in progress, not a
        # transient blip. severity=critical routes to the priority-1 Pushover receiver
        # (route lives in the "Alertmanager Config" 1Password item), which repeats every
        # 4h instead of 12h. The plain PodCrashLooping warning keeps firing alongside —
        # this adds escalation, it suppresses nothing. Context: the 2026-07-13 shlink
        # crashloop ran ~30h because it only ever surfaced as a quiet priority-0 warning.
        - alert: UserFacingPodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace=~"shlink|mediastack|homepage|authentik"}[30m]) > 3
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "User-facing pod {{ $labels.namespace }}/{{ $labels.pod }} crash-looping for 30m+"
            description: >-
              Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }}
              has restarted {{ $value | printf "%.0f" }} times in the last 30 minutes and the
              loop has persisted past the 30-minute escalation window. Treat as a user-facing
              outage: check `kubectl describe pod` and recent events in the namespace, and if
              it is a stale Longhorn mount follow the scale-0 -> wait-detached -> scale-up
              runbook.

        - alert: PodNotReady
          expr: |
            (
              kube_pod_status_ready{condition="true",namespace!~"trivy-system|velero",pod!~"volsync-src-.*"} == 0
            ) unless on(pod, namespace)
              kube_pod_status_phase{phase=~"Succeeded|Failed"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-ready state for more than 15 minutes."

    - name: longhorn
      rules:
        - alert: LonghornVolumeDegraded
          expr: |
            longhorn_volume_robustness{state="degraded"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.pvc }} ({{ $labels.pvc_namespace }}) is degraded"
            description: "Volume {{ $labels.volume }} (PVC {{ $labels.pvc }}/{{ $labels.pvc_namespace }}) degraded 10+ min. A replica may be rebuilding or a node is unhealthy."

        - alert: LonghornVolumeFaulted
          expr: |
            longhorn_volume_robustness{state="faulted"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn volume {{ $labels.pvc }} ({{ $labels.pvc_namespace }}) is faulted"
            description: "Volume {{ $labels.volume }} backing PVC {{ $labels.pvc }} in {{ $labels.pvc_namespace }} is faulted. Data may be inaccessible."

        - alert: LonghornNodeStorageLow
          expr: |
            (longhorn_node_storage_capacity_bytes - longhorn_node_storage_usage_bytes)
              / longhorn_node_storage_capacity_bytes < 0.15
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn node {{ $labels.node }} storage below 15% free"
            description: "Longhorn storage node {{ $labels.node }} has less than 15% free. New replicas may fail to schedule. Expand the disk or evict replicas."

    - name: minio
      rules:
        - alert: MinioDiskUsageHigh
          expr: |
            kubelet_volume_stats_available_bytes{namespace="minio"}
              / kubelet_volume_stats_capacity_bytes{namespace="minio"} < 0.20
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "MinIO PVC {{ $labels.persistentvolumeclaim }} below 20% free"
            description: "MinIO PVC {{ $labels.persistentvolumeclaim }} has {{ $value | humanizePercentage }} free. Review Velero backup TTLs, Loki retention, and kopia GC status."

        - alert: MinioDiskUsageCritical
          expr: |
            kubelet_volume_stats_available_bytes{namespace="minio"}
              / kubelet_volume_stats_capacity_bytes{namespace="minio"} < 0.10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "MinIO PVC {{ $labels.persistentvolumeclaim }} below 10% free"
            description: "MinIO PVC {{ $labels.persistentvolumeclaim }} has {{ $value | humanizePercentage }} free. Immediate action required — node kubelet eviction threshold is ~10-15%."

    # Harbor is on the image-pull critical path: all 9 nodes proxy docker.io through
    # the Harbor proxy cache, so an unhealthy Harbor blocks new pod scheduling
    # cluster-wide once local image caches miss. Metrics come from the harbor-exporter
    # enabled in the harbor chart values (metrics.enabled + serviceMonitor).
    - name: harbor
      rules:
        # harbor_health is the exporter's overall status gauge (1 healthy / 0 not).
        # critical because of the image-pull blast radius described above.
        - alert: HarborUnhealthy
          expr: |
            harbor_health == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Harbor is reporting unhealthy"
            description: >-
              Harbor's aggregate health check has been failing for 10+ minutes. Image
              pulls through the docker.io proxy cache will start failing once node-local
              caches miss. Check component status with the HarborComponentUnhealthy
              alert / harbor_up, and `kubectl get pods -n harbor`.

        # Per-component gauge (component ∈ core/database/jobservice/portal/redis/
        # registry/registryctl/trivy). Warning-level early signal — a single sick
        # component (e.g. trivy) does not necessarily break pulls.
        - alert: HarborComponentUnhealthy
          expr: |
            harbor_up == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Harbor component {{ $labels.component }} unhealthy"
            description: >-
              Harbor component {{ $labels.component }} has been reporting unhealthy for
              15+ minutes. Registry pulls may still work; investigate before it
              escalates to HarborUnhealthy.

        # Weekly registry GC (tofu harbor-config: Sat 05:00 UTC) guards the 5Gi
        # registry PVC — GC silently never running is what filled it to 91% on
        # 2026-07-22. Label values verified against goharbor/harbor source
        # (src/jobservice/runner/redis.go): type is the job name
        # "GARBAGE_COLLECTION", status is one of success/fail/stop.
        - alert: HarborGarbageCollectionFailed
          expr: |
            increase(harbor_jobservice_task_total{type="GARBAGE_COLLECTION",status="fail"}[24h]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Harbor garbage collection failed"
            description: >-
              A Harbor GC job failed within the last 24h. The registry PVC is only 5Gi
              (intentionally); check the GC run log in Harbor (Administration ->
              Clean Up -> Garbage Collection) and the jobservice pod logs.

        # Schedule-broken detector: fires if no GC has *succeeded* in 8 days
        # (weekly cadence + 1 day slack). Catches the schedule being deleted or
        # wedged, which a failure counter cannot see. Caveat: if the
        # status="success" series has never existed (exporter fresh, zero GC runs),
        # increase() returns no data and this stays silent — the first successful
        # run arms it.
        - alert: HarborGarbageCollectionMissing
          expr: |
            increase(harbor_jobservice_task_total{type="GARBAGE_COLLECTION",status="success"}[8d]) == 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "No successful Harbor GC in 8+ days"
            description: >-
              The weekly Harbor garbage collection (Sat 05:00 UTC, managed by the
              harbor-config tofu module) has not completed successfully in over 8
              days. Verify the schedule exists in Harbor and check jobservice health
              before the 5Gi registry PVC fills again.
