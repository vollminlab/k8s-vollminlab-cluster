apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-prometheus-stack-values
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    env: production
    category: observability
data:
  values.yaml: |
    fullnameOverride: kube-prometheus-stack

    prometheus:
      prometheusSpec:
        externalUrl: https://prometheus.vollminlab.com
        scrapeInterval: 30s
        retention: 24h
        remoteWrite:
          - url: http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428/api/v1/write
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMetadata:
          labels:
            app: prometheus
            env: production
            category: observability
        evaluationInterval: 2m
        resources:
          requests:
            cpu: 500m
            memory: 1500Mi
          limits:
            cpu: 2000m
            memory: 3Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi

    grafana:
      enabled: true
      deploymentStrategy:
        type: Recreate
      ingress:
        enabled: false
      admin:
        existingSecret: grafana-admin-credentials
        userKey: admin-user
        passwordKey: admin-password
      podLabels:
        app: grafana
        env: production
        category: observability
      grafana.ini:
        feature_toggles:
          kubernetesDashboards: false
        server:
          root_url: https://grafana.vollminlab.com
      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          cpu: 500m
          memory: 768Mi
      plugins:
        - grafana-lokiexplore-app

      persistence:
        enabled: true
        storageClassName: longhorn
        size: 1Gi
        accessModes:
          - ReadWriteOnce

      sidecar:
        datasources:
          defaultDatasourceEnabled: false
      additionalDataSources:
        - name: VictoriaMetrics
          type: prometheus
          uid: prometheus
          access: proxy
          url: http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428
          isDefault: true
          jsonData:
            timeInterval: 30s
        - name: Prometheus (live)
          type: prometheus
          uid: prometheus-live
          access: proxy
          url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          isDefault: false
          jsonData:
            timeInterval: 30s
        - name: Loki
          type: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy

    alertmanager:
      alertmanagerSpec:
        replicas: 3
        externalUrl: https://alertmanager.vollminlab.com
        configSecret: alertmanager-pushover-config
        podMetadata:
          labels:
            app: alertmanager
            env: production
            category: observability
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi

    nodeExporter:
      operatingSystems:
        aix:
          enabled: false
        darwin:
          enabled: false

    prometheus-node-exporter:
      tolerations:
        - key: dmz
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      podLabels:
        app: node-exporter
        env: production
        category: observability
      prometheus:
        monitor:
          relabelings:
            - sourceLabels: [__meta_kubernetes_pod_node_name]
              targetLabel: instance

    kubeEtcd:
      enabled: true
      endpoints:
        - 192.168.152.8
        - 192.168.152.9
        - 192.168.152.10
      service:
        port: 2381
        targetPort: 2381

    kubeControllerManager:
      enabled: true
      endpoints:
        - 192.168.152.8
        - 192.168.152.9
        - 192.168.152.10

    kubeScheduler:
      enabled: true
      endpoints:
        - 192.168.152.8
        - 192.168.152.9
        - 192.168.152.10

    kubeProxy:
      enabled: true

    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: apiserver_request_body_size_bytes_bucket
            action: drop

    defaultRules:
      rules:
        kubeApiserver: true
        etcd: true
      disabled:
        KubeClientCertificateExpiration: true
        KubeJobFailed: true

    kube-state-metrics:
      podLabels:
        app: kube-state-metrics
        env: production
        category: observability
