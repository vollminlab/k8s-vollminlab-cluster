apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-prometheus-stack-values
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    env: production
    category: observability
data:
  values.yaml: |
    fullnameOverride: kube-prometheus-stack

    prometheus:
      prometheusSpec:
        externalUrl: https://prometheus.vollminlab.com
        scrapeInterval: 30s
        retention: 24h
        remoteWrite:
          # #1 hot tier (30d, SSD) — the default Grafana datasource.
          - url: http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428/api/v1/write
          # #2 cold tier (395d, pool_0 spinning disk). Its own queue isolates the
          # slow endpoint: if pool_0 falls behind, only the LT shard queue backs up
          # — the hot write and scraping are unaffected.
          - url: http://victoria-metrics-lt-server.monitoring.svc.cluster.local:8428/api/v1/write
            name: vm-lt
            queueConfig:
              capacity: 10000
              maxShards: 10
              maxSamplesPerSend: 2000
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMetadata:
          labels:
            app: prometheus
            env: production
            category: observability
        evaluationInterval: 2m
        resources:
          requests:
            cpu: 500m
            # ~2.5Gi reflects real steady-state usage (~2.7Gi observed). RAM here
            # is driven by ~600k active head series, NOT retention — the 24h cut
            # (PR #834) did not reduce it. Under-requesting silently over-commits
            # the node and worsened memory pressure.
            memory: 2560Mi
          limits:
            cpu: 2000m
            memory: 3584Mi
        storageSpec:
          volumeClaimTemplate:
            spec:
              # longhorn-r2 = 2 replicas (vs longhorn's 3) — Prometheus is ephemeral
              # now (24h retention; VM holds long-term history), so 2 replicas is
              # plenty and reclaims Longhorn space. NOTE: VCT storageClassName is
              # immutable, so this only takes effect after the StatefulSet + PVC are
              # recreated (done once at merge time).
              storageClassName: longhorn-r2
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi

    grafana:
      enabled: true
      deploymentStrategy:
        type: Recreate
      ingress:
        enabled: false
      admin:
        existingSecret: grafana-admin-credentials
        userKey: admin-user
        passwordKey: admin-password
      podLabels:
        app: grafana
        env: production
        category: observability
      grafana.ini:
        feature_toggles:
          kubernetesDashboards: false
        server:
          root_url: https://grafana.vollminlab.com
      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          cpu: 500m
          memory: 768Mi
      plugins:
        - grafana-lokiexplore-app

      persistence:
        enabled: true
        storageClassName: longhorn
        size: 1Gi
        accessModes:
          - ReadWriteOnce

      sidecar:
        datasources:
          defaultDatasourceEnabled: false
      additionalDataSources:
        - name: VictoriaMetrics
          type: prometheus
          uid: prometheus
          access: proxy
          url: http://victoria-metrics-single-server.monitoring.svc.cluster.local:8428
          isDefault: true
          jsonData:
            timeInterval: 30s
        - name: Prometheus (live)
          type: prometheus
          uid: prometheus-live
          access: proxy
          url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          isDefault: false
          jsonData:
            timeInterval: 30s
        - name: VictoriaMetrics (long-term)
          type: prometheus
          uid: victoriametrics-lt
          access: proxy
          url: http://victoria-metrics-lt-server.monitoring.svc.cluster.local:8428
          isDefault: false
          jsonData:
            timeInterval: 30s
        - name: Loki
          type: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy

    alertmanager:
      alertmanagerSpec:
        replicas: 3
        externalUrl: https://alertmanager.vollminlab.com
        configSecret: alertmanager-pushover-config
        podMetadata:
          labels:
            app: alertmanager
            env: production
            category: observability
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi

    nodeExporter:
      operatingSystems:
        aix:
          enabled: false
        darwin:
          enabled: false

    prometheus-node-exporter:
      tolerations:
        - key: dmz
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      podLabels:
        app: node-exporter
        env: production
        category: observability
      prometheus:
        monitor:
          relabelings:
            - sourceLabels: [__meta_kubernetes_pod_node_name]
              targetLabel: instance

    kubeEtcd:
      enabled: true
      endpoints:
        - 192.168.152.8
        - 192.168.152.9
        - 192.168.152.10
      service:
        port: 2381
        targetPort: 2381

    kubeControllerManager:
      enabled: true
      endpoints:
        - 192.168.152.8
        - 192.168.152.9
        - 192.168.152.10

    kubeScheduler:
      enabled: true
      endpoints:
        - 192.168.152.8
        - 192.168.152.9
        - 192.168.152.10

    kubeProxy:
      enabled: true

    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: apiserver_request_body_size_bytes_bucket
            action: drop

    defaultRules:
      rules:
        kubeApiserver: true
        etcd: true
      disabled:
        KubeClientCertificateExpiration: true
        KubeJobFailed: true

    kube-state-metrics:
      podLabels:
        app: kube-state-metrics
        env: production
        category: observability
      # Kyverno requires CPU+memory requests and limits on every pod. The subchart
      # ships with resources: {} (none), so KSM ran unbounded. Sized from observed
      # usage: ~43Mi steady, ~127Mi 24h peak — 256Mi limit gives ~2x headroom.
      resources:
        requests:
          cpu: 25m
          memory: 96Mi
        limits:
          cpu: 200m
          memory: 256Mi
      # Relax the liveness probe so a brief kube-apiserver blip does not crash-loop
      # KSM. /livez makes a live API call; the default 5s timeout / 3 failures (~30s)
      # is too tight on this cluster, which sees occasional shared-storage etcd
      # latency spikes that briefly stall the apiserver. 10s timeout / 5 failures
      # (~50s) rides out a transient stall without restarting. Readiness is left at
      # default — a brief readiness failure only drops KSM from its Service (a short
      # metrics gap), it does not restart the pod.
      livenessProbe:
        failureThreshold: 5
        timeoutSeconds: 10
      # --- GitOps control-plane readiness metrics ---
      # Flux v2.8 controllers no longer expose gotk_reconcile_condition (the old
      # per-resource readiness gauge was removed; controllers only emit
      # gotk_reconcile_duration_seconds now). The documented replacement is
      # kube-state-metrics Custom Resource State, which reads the Ready condition
      # directly off each Flux/tofu CR and emits gotk_resource_info{ready=...}.
      # Without this, a failed Kustomization/HelmRelease/Terraform reconcile is
      # invisible to Prometheus — the gap that let 5 tofu workspaces fail silently.
      # RBAC: KSM's ClusterRole has no access to these CRDs by default; extraRules
      # grant the list/watch it needs to read them.
      rbac:
        extraRules:
          - apiGroups: ["kustomize.toolkit.fluxcd.io"]
            resources: ["kustomizations"]
            verbs: ["list", "watch"]
          - apiGroups: ["helm.toolkit.fluxcd.io"]
            resources: ["helmreleases"]
            verbs: ["list", "watch"]
          - apiGroups: ["source.toolkit.fluxcd.io"]
            resources:
              ["gitrepositories", "ocirepositories", "helmrepositories", "helmcharts", "buckets"]
            verbs: ["list", "watch"]
          - apiGroups: ["infra.contrib.fluxcd.io"]
            resources: ["terraforms"]
            verbs: ["list", "watch"]
      customResourceState:
        enabled: true
        config:
          spec:
            resources:
              # Each resource emits gotk_resource_info{name, exported_namespace,
              # customresource_group/kind/version (auto), ready, reason, suspended} = 1.
              # ready/reason come from the Ready condition; suspended from spec.suspend.
              - groupVersionKind:
                  group: kustomize.toolkit.fluxcd.io
                  version: v1
                  kind: Kustomization
                metricNamePrefix: gotk
                labelsFromPath:
                  name: [metadata, name]
                  exported_namespace: [metadata, namespace]
                metrics:
                  - name: resource_info
                    help: "The current readiness of a Flux GitOps Toolkit resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          ready: [status, conditions, "[type=Ready]", status]
                          reason: [status, conditions, "[type=Ready]", reason]
                          suspended: [spec, suspend]
              - groupVersionKind:
                  group: helm.toolkit.fluxcd.io
                  version: v2
                  kind: HelmRelease
                metricNamePrefix: gotk
                labelsFromPath:
                  name: [metadata, name]
                  exported_namespace: [metadata, namespace]
                metrics:
                  - name: resource_info
                    help: "The current readiness of a Flux GitOps Toolkit resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          ready: [status, conditions, "[type=Ready]", status]
                          reason: [status, conditions, "[type=Ready]", reason]
                          suspended: [spec, suspend]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: GitRepository
                metricNamePrefix: gotk
                labelsFromPath:
                  name: [metadata, name]
                  exported_namespace: [metadata, namespace]
                metrics:
                  - name: resource_info
                    help: "The current readiness of a Flux GitOps Toolkit resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          ready: [status, conditions, "[type=Ready]", status]
                          reason: [status, conditions, "[type=Ready]", reason]
                          suspended: [spec, suspend]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: OCIRepository
                metricNamePrefix: gotk
                labelsFromPath:
                  name: [metadata, name]
                  exported_namespace: [metadata, namespace]
                metrics:
                  - name: resource_info
                    help: "The current readiness of a Flux GitOps Toolkit resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          ready: [status, conditions, "[type=Ready]", status]
                          reason: [status, conditions, "[type=Ready]", reason]
                          suspended: [spec, suspend]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: HelmRepository
                metricNamePrefix: gotk
                labelsFromPath:
                  name: [metadata, name]
                  exported_namespace: [metadata, namespace]
                metrics:
                  - name: resource_info
                    help: "The current readiness of a Flux GitOps Toolkit resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          ready: [status, conditions, "[type=Ready]", status]
                          reason: [status, conditions, "[type=Ready]", reason]
                          suspended: [spec, suspend]
              # tofu-controller Terraform CRs (served v1alpha2). Same Ready-condition
              # shape; reason carries TerraformAppliedSucceed / TFExecPlanFailed /
              # DriftDetected — the alert keys on reason to skip intentional drift.
              - groupVersionKind:
                  group: infra.contrib.fluxcd.io
                  version: v1alpha2
                  kind: Terraform
                metricNamePrefix: gotk
                labelsFromPath:
                  name: [metadata, name]
                  exported_namespace: [metadata, namespace]
                metrics:
                  - name: resource_info
                    help: "The current readiness of a tofu-controller Terraform resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          ready: [status, conditions, "[type=Ready]", status]
                          reason: [status, conditions, "[type=Ready]", reason]
                          suspended: [spec, suspend]
