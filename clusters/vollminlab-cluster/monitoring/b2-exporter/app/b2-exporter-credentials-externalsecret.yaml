apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: b2-exporter-credentials
  namespace: monitoring
  labels:
    app: b2-exporter
    env: production
    category: observability
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: b2-exporter-credentials
    creationPolicy: Owner
  data:
    - secretKey: B2_APPLICATION_KEY_ID
      remoteRef:
        key: "Backblaze B2 Homepage Exporter"
        property: keyID
    - secretKey: B2_APPLICATION_KEY
      remoteRef:
        key: "Backblaze B2 Homepage Exporter"
        property: credential
    - secretKey: B2_BUCKET_NAME
      remoteRef:
        key: "Backblaze B2 Homepage Exporter"
        property: B2_BUCKET_NAME
