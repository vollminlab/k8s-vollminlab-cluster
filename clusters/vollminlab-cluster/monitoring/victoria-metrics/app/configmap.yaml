apiVersion: v1
kind: ConfigMap
metadata:
  name: victoria-metrics-values
  namespace: monitoring
  labels:
    app: victoria-metrics
    env: production
    category: observability
data:
  values.yaml: |
    # Stable service name -> victoria-metrics-single-server.monitoring.svc:8428
    fullnameOverride: victoria-metrics-single

    server:
      # 30d local retention. 90d on longhorn-r2 (2 replicas) projected to ~145GB on-disk —
      # far past the 30Gi PVC. 30d steady-state (~1.6GB/day → ~48GB) fits the 60Gi PVC below.
      retentionPeriod: 30d

      # mode: statefulSet (not deployment) so the RWO Longhorn volume is handled via a
      # volumeClaimTemplate and there is no rolling-update detach trap.
      mode: statefulSet

      persistentVolume:
        enabled: true
        storageClassName: longhorn-r2
        accessModes:
          - ReadWriteOnce
        # 60Gi headroom over the ~48GB 30d steady-state. NOTE: volumeClaimTemplate is
        # immutable — bumping this does NOT resize the live PVC. After merge, online-patch
        # the PVC + recreate the STS --cascade=orphan so Flux re-templates at 60Gi.
        size: 60Gi

      podLabels:
        app: victoria-metrics
        env: production
        category: observability

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi

      # Let Prometheus scrape VM's own /metrics so VM health (ingestion rate,
      # dedup, disk growth, uptime) is visible in Grafana. Prometheus scrapes all
      # ServiceMonitors (serviceMonitorSelectorNilUsesHelmValues: false), so
      # enabling this is sufficient. Marginal cardinality (single vmsingle).
      serviceMonitor:
        enabled: true
        extraLabels:
          app: victoria-metrics
          env: production
          category: observability
