apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: loki-deployment
  namespace: flux-system
  labels:
    app: loki
    env: production
    category: observability
resources:
  - helmrelease.yaml
  - configmap.yaml
  - loki-minio-credentials-externalsecret.yaml
  - loki-ruler-rules-configmap.yaml
