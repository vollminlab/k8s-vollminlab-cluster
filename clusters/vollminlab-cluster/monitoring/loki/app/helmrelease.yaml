apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
    env: production
    category: observability
spec:
  interval: 10m
  chart:
    spec:
      chart: loki
      version: 7.1.0
      sourceRef:
        kind: HelmRepository
        name: grafana-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: loki-values
