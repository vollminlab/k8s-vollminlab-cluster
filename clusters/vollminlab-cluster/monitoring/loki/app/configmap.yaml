apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-values
  namespace: monitoring
  labels:
    app: loki
    env: production
    category: observability
data:
  values.yaml: |
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false

      commonConfig:
        replication_factor: 1

      storage:
        type: s3
        bucketNames:
          chunks: loki
          ruler: loki
          admin: loki
        s3:
          endpoint: minio.minio.svc.cluster.local:9000
          insecure: true
          s3ForcePathStyle: true

      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

      limits_config:
        retention_period: 720h

      compactor:
        retention_enabled: true
        delete_request_store: s3

      rulerConfig:
        alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
        enable_api: true
        storage:
          type: local
          local:
            directory: /etc/loki/rules

    singleBinary:
      replicas: 1

      extraEnv:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: loki-minio-credentials
              key: access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: loki-minio-credentials
              key: secret-key

      persistence:
        enabled: true
        storageClass: longhorn
        size: 5Gi

      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi

      podLabels:
        app: loki
        env: production
        category: observability

      extraVolumes:
        - name: ruler-rules
          configMap:
            name: loki-ruler-rules
      extraVolumeMounts:
        - name: ruler-rules
          mountPath: /etc/loki/rules/fake

    gateway:
      enabled: false

    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    lokiCanary:
      enabled: false

    test:
      enabled: false
