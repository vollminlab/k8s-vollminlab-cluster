---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: monitoring
  labels:
    app: monitoring
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: monitoring
  labels:
    app: monitoring
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow all monitoring pods to communicate (Prometheus↔AlertManager, promtail→Loki,
# Prometheus→VictoriaMetrics remote-write, Grafana→Prometheus datasource)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: monitoring
  labels:
    app: monitoring
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Allow ingress-nginx to reach Grafana (3000), Prometheus (9090), AlertManager (9093),
# VictoriaMetrics (8428). Grafana's container port is 3000 (service maps 80→3000;
# ingress-nginx connects to the container port directly via EndpointSlices).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
  namespace: monitoring
  labels:
    app: monitoring
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8428
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9093
---
# Allow homepage to query Prometheus for dashboard widgets (prometheusmetric widget)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homepage-prometheus
  namespace: monitoring
  labels:
    app: monitoring
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: homepage
      ports:
        - protocol: TCP
          port: 9090
---
# Allow the homepage dashboard to reach Grafana for its status widget.
# Homepage calls http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80,
# which DNATs to container port 3000. Without this the request is dropped by
# default-deny and the widget reports "API Error: connect ETIMEDOUT".
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homepage-grafana
  namespace: monitoring
  labels:
    app: monitoring
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: homepage
      ports:
        - protocol: TCP
          port: 3000
---
# Allow kube-apiserver (CP nodes) to call prometheus-operator admission webhook.
# Container port is 10250 (named "https"); service maps 443→10250. Port 443 is NOT
# a container port and must not appear here.
#
# ipBlock is NOT used — see cnpg-system allow-webhook-ingress for the explanation.
# Calico IPIP + rp_filter=2 silently drops host→pod ipBlock rules for cross-node traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-ingress
  namespace: monitoring
  labels:
    app: monitoring
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 10250
---
# Allow all egress: Prometheus scrapes pods in all namespaces and node-level endpoints
# (kubelet 10250, node-exporter 9100, etcd 2381, kube-apiserver 6443);
# AlertManager sends webhook alerts; vmware-exporter calls vCenter; b2-exporter calls B2 API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-egress
  namespace: monitoring
  labels:
    app: monitoring
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
