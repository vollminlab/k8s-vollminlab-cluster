apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: volsync-system
  labels:
    app: volsync
    env: production
    category: storage
spec:
  interval: 5m
  releaseName: volsync
  chart:
    spec:
      chart: volsync
      version: 0.16.0
      sourceRef:
        kind: HelmRepository
        name: volsync-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: volsync-values
      valuesKey: values.yaml
