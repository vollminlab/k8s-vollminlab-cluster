apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-values
  namespace: renovate
  labels:
    app: renovate
    env: production
    category: apps
data:
  values.yaml: |
    cronjob:
      schedule: "0 23 * * *"
      timeZone: "America/New_York"
      suspend: false

    pod:
      labels:
        app: renovate
        env: production
        category: apps

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1536Mi

    envFrom:
      - secretRef:
          name: renovate-token

    renovate:
      config: |
        {
          "platform": "github",
          "repositories": ["vollminlab/k8s-vollminlab-cluster"],
          "gitAuthor": "Renovate Bot <bot@renovateapp.com>",
          "onboarding": false,
          "requireConfig": "optional",
          "autodiscover": false,
          "customManagers": [
            {
              "customType": "regex",
              "fileMatch": ["^\\.kubernetes-version$"],
              "matchStrings": ["^(?<currentValue>[\\d.]+)"],
              "datasourceTemplate": "github-releases",
              "depNameTemplate": "kubernetes/kubernetes",
              "extractVersionTemplate": "^v(?<version>.*)$"
            }
          ],
          "packageRules": [
            {
              "matchDepNames": ["kubernetes/kubernetes"],
              "allowedVersions": "/^v[0-9]+\\.[0-9]+\\.[0-9]+$/",
              "commitMessagePrefix": "chore(k8s):"
            }
          ]
        }
