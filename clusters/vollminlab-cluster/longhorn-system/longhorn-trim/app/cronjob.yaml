apiVersion: batch/v1
kind: CronJob
metadata:
  name: longhorn-trim
  namespace: longhorn-system
  labels:
    app: longhorn-trim
    env: production
    category: storage
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: longhorn-trim
            env: production
            category: storage
        spec:
          restartPolicy: OnFailure
          containers:
            - name: trim
              image: alpine:3.23.4
              command:
                - /bin/sh
                - -c
                - |
                  apk add --no-cache curl jq
                  echo "Longhorn filesystem trim starting - $(date)"
                  VOLS=$(curl -sf http://longhorn-backend:9500/v1/volumes | jq -r '.data[] | select(.state=="attached") | .id')
                  COUNT=0
                  for VOL in $VOLS; do
                    echo "Trimming: $VOL"
                    curl -sf -X POST "http://longhorn-backend:9500/v1/volumes/${VOL}?action=trimFilesystem" >/dev/null \
                      && COUNT=$((COUNT + 1)) \
                      || echo "Warning: trim failed for $VOL"
                  done
                  echo "Done: trimmed $COUNT volumes - $(date)"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
