apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn-rebalancing-controller
  namespace: longhorn-system
  labels:
    app: longhorn-rebalancing-controller
    env: production
    category: storage
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: longhorn-rebalancing-controller-repo
    namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: longhorn-rebalancing-controller-values
