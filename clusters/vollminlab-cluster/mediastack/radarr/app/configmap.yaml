apiVersion: v1
kind: ConfigMap
metadata:
  name: radarr-values
  namespace: mediastack
  labels:
    app: radarr
    env: production
    category: media
data:
  values.yaml: |
    persistence:
      config:
        enabled: true
        existingClaim: pvc-radarr-config
        mountPath: /config
      downloads:
        enabled: true
        existingClaim: pvc-completed-downloads
        mountPath: /downloads
      movies:
        enabled: true
        existingClaim: pvc-movies
        mountPath: /movies
    terminationGracePeriodSeconds: 60
    lifecycle:
      preStop:
        exec:
          command: ["/bin/sh", "-c", "sleep 10"]
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - velero
              topologyKey: kubernetes.io/hostname
    resources:
      requests:
        # VPA target ~35m. Request 100m→50m. Limit unchanged (500m).
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
    podLabels:
      app: radarr
      env: production
      category: media
    podAnnotations:
      backup.velero.io/backup-volumes-excludes: "tmp,varlogs,varrun,devshm"
    env:
      RADARR__AUTH__METHOD: "External"
    securityContext:
      runAsUser: 568
      runAsGroup: 568
    podSecurityContext:
      fsGroup: 568
      fsGroupChangePolicy: "OnRootMismatch"
