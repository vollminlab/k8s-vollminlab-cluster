apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: mediastack
  labels:
    app: qbittorrent
    env: production
    category: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
        app.kubernetes.io/name: qbittorrent
        env: production
        category: media
    spec:
      securityContext:
        fsGroup: 568
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: fix-lockfile
          image: docker.io/library/busybox:1.38.0
          command: ["sh", "-c", "rm -f /config/qBittorrent/lockfile /config/qBittorrent/ipc-socket"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: pvc-qbittorrent-config
        - name: downloads
          persistentVolumeClaim:
            claimName: pvc-completed-downloads
      containers:
        - name: qbittorrent
          image: ghcr.io/linuxserver/qbittorrent:5.2.0@sha256:4e665d7a597acf308aa01d84d7a378abd285982cd793785042c2f4110280b620
          env:
            - name: PUID
              value: "568"
            - name: PGID
              value: "568"
            - name: LSIO_NON_ROOT_USER
              value: "true"
            - name: WEBUI_PORT
              value: "8080"
          resources:
            requests:
              # VPA target/upperBound ~11m. Request 100m→50m. Limit unchanged (1000m).
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          ports:
            - containerPort: 8080
              name: webui
          readinessProbe:
            httpGet:
              path: /api/v2/app/version
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:v3.41.1@sha256:2f33c71e5e164fcd51a962cb950134df25155593edf0c3e1201f888d027049b4
          securityContext:
            capabilities:
              add: [NET_ADMIN]
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "private internet access"
            - name: VPN_TYPE
              value: "openvpn"
            - name: SERVER_REGIONS
              value: "CA Montreal"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: FIREWALL_INPUT_PORTS
              value: "8080"
            # DoT upstream in gluetun v3.41.x leaks UDP sockets when queries time out
            # during VPN degradation (upstream #3351/#3377) — DoH is the endorsed workaround
            - name: DNS_UPSTREAM_RESOLVER_TYPE
              value: "doh"
          envFrom:
            - secretRef:
                name: qbittorrent-pia-credentials
          ports:
            - containerPort: 8000
              name: gluetun-ctrl
