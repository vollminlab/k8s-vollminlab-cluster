apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bazarr-exportarr-apikey
  namespace: mediastack
  labels:
    app: bazarr-exportarr
    env: production
    category: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: bazarr-exportarr-apikey
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: "Bazarr API Key"
        property: api_key
