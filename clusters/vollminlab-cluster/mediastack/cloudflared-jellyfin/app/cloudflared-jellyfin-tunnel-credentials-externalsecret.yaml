apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-jellyfin-tunnel-credentials
  namespace: mediastack
  labels:
    app: cloudflared-jellyfin
    env: production
    category: media
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: cloudflared-jellyfin-tunnel-credentials
    creationPolicy: Owner
  data:
    - secretKey: tunnel-token
      remoteRef:
        key: "Cloudflare Jellyfin Tunnel"
        property: token
