apiVersion: v1
kind: ConfigMap
metadata:
  name: sabnzbd-values
  namespace: mediastack
  labels:
    app: sabnzbd
    env: production
    category: media
data:
  values.yaml: |
    persistence:
      config:
        enabled: true
        existingClaim: pvc-sabnzbd-config
        mountPath: /config
      downloads:
        enabled: true
        existingClaim: pvc-completed-downloads
        mountPath: /downloads
      incomplete:
        enabled: true
        existingClaim: pvc-incomplete-downloads
        mountPath: /incomplete
    podLabels:
      app: sabnzbd
      env: production
      category: media
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - velero
              topologyKey: kubernetes.io/hostname
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    env:
      - name: SABNZBD__HOST_WHITELIST_ENTRIES
        value: sabnzbd.vollminlab.com,localhost,127.0.0.1
      - name: SABNZBD__USERNAME
        value: ""
      - name: SABNZBD__PASSWORD
        value: ""