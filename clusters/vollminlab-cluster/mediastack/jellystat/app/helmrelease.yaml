apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellystat
  namespace: mediastack
  labels:
    app: jellystat
    env: production
    category: media
spec:
  interval: 5m
  chart:
    spec:
      chart: jellystat
      version: "0.1.12"
      sourceRef:
        kind: HelmRepository
        name: jellystat-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: jellystat-values
      valuesKey: values.yaml
    - kind: Secret
      name: jellystat-credentials
      valuesKey: helm-values.yaml
