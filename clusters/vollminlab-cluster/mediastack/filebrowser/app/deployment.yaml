apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: mediastack
  labels:
    app: filebrowser
    env: production
    category: apps
    app.kubernetes.io/name: filebrowser
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
        env: production
        category: apps
        app.kubernetes.io/name: filebrowser
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:v2.63.3
          args: ["--config", "/config/settings.json"]
          env:
            - name: FB_AUTH_METHOD
              value: proxy
            - name: FB_AUTH_HEADER
              value: X-authentik-username
            - name: FB_TUS_CHUNKSIZE
              value: "52428800"
            - name: FB_TUS_RETRYCOUNT
              value: "2"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
            - name: settings
              mountPath: /config/settings.json
              subPath: settings.json
            - name: audiobooks-incoming
              mountPath: /srv/Audiobooks
            - name: misc-incoming
              mountPath: /srv/Misc
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: pvc-filebrowser-config
        - name: settings
          configMap:
            name: filebrowser-settings
        - name: audiobooks-incoming
          persistentVolumeClaim:
            claimName: pvc-audiobooks-incoming
        - name: misc-incoming
          persistentVolumeClaim:
            claimName: pvc-misc-incoming
