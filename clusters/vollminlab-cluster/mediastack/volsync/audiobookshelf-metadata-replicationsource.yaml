apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: audiobookshelf-metadata-restic
  namespace: mediastack
spec:
  sourcePVC: pvc-audiobookshelf-metadata
  trigger:
    schedule: "0 3 * * *"
  restic:
    pruneIntervalDays: 7
    repository: volsync-audiobookshelf-metadata-restic
    retain:
      daily: 7
      weekly: 4
      monthly: 3
    copyMethod: Clone
    cacheCapacity: 1Gi
    cacheStorageClassName: longhorn
