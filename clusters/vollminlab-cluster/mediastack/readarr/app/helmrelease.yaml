apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readarr
  namespace: mediastack
  labels:
    app: readarr
    env: production
    category: media
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: readarr-repo
    namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: readarr-values
      valuesKey: values.yaml
