apiVersion: v1
kind: ConfigMap
metadata:
  name: sonarr-values
  namespace: mediastack
  labels:
    app: sonarr
    env: production
    category: media
data:
  values.yaml: |
    persistence:
      config:
        enabled: true
        existingClaim: pvc-sonarr-config
        mountPath: /config
      downloads:
        enabled: true
        existingClaim: pvc-completed-downloads
        mountPath: /downloads
      tv:
        enabled: true
        existingClaim: pvc-tv
        mountPath: /tv
    resources:
      requests:
        # VPA target/upperBound ~23m. Request 100m→50m. Limit unchanged (500m).
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    podLabels:
      app: sonarr
      env: production
      category: media
    podAnnotations:
      backup.velero.io/backup-volumes-excludes: "tmp,varlogs,varrun,devshm"
    env:
      SONARR__AUTH__METHOD: "External"
    securityContext:
      runAsUser: 568
      runAsGroup: 568
    podSecurityContext:
      fsGroup: 568
      fsGroupChangePolicy: "OnRootMismatch"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - velero
              topologyKey: kubernetes.io/hostname
    terminationGracePeriodSeconds: 60
    lifecycle:
      preStop:
        exec:
          command: ["/bin/sh", "-c", "sleep 10"]
    livenessProbe:
      httpGet: { path: /ping, port: 8989 }
      initialDelaySeconds: 60
    startupProbe:
      httpGet: { path: /ping, port: 8989 }
      failureThreshold: 60
      periodSeconds: 5
