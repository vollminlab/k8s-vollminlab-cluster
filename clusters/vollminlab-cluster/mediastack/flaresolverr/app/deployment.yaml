apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: mediastack
  labels:
    app: flaresolverr
    env: production
    category: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
        app.kubernetes.io/name: flaresolverr
        env: production
        category: media
    spec:
      securityContext:
        seccompProfile:
          type: Unconfined
      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:v3.4.6@sha256:524715c5b5d045ff77ae409ffa1d6c0fcf9f23a2e5e957eb44da4f2fc53e6876
          ports:
            - containerPort: 8191
              name: http
          resources:
            requests:
              cpu: 100m
              # Idles at ~0-100Mi; spikes only briefly during a headless-Chromium
              # Cloudflare solve. 192Mi request / 768Mi limit keeps solve headroom
              # while reclaiming the over-provisioned 512Mi/2Gi.
              memory: 192Mi
            limits:
              cpu: 1000m
              memory: 768Mi
