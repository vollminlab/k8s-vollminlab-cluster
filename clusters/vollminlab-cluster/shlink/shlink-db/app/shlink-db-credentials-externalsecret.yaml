apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shlink-db-credentials
  namespace: shlink
  labels:
    app: shlink-db
    env: production
    category: apps
spec:
  refreshInterval: "0"
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: shlink-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: "Shlink DB Credentials"
        property: username
    - secretKey: password
      remoteRef:
        key: "Shlink DB Credentials"
        property: password
