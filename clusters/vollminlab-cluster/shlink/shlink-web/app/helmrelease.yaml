apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shlink-web
  namespace: shlink
  labels:
    app: shlink-web
    env: production
    category: apps
spec:
  interval: 10m
  chart:
    spec:
      chart: shlink-web
      version: 1.13.0
      sourceRef:
        kind: HelmRepository
        name: shlink-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: shlink-web-values
