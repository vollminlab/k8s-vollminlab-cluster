apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shlink
  namespace: shlink
  labels:
    app: shlink
    env: production
    category: apps
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: shlink-backend
      version: 11.5.10
      sourceRef:
        kind: HelmRepository
        name: shlink-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: shlink-values
