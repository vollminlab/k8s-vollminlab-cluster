apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-env-vars
  namespace: homepage
  labels:
    app: homepage
    env: production
    category: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: homepage-env-vars
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: "Homepage Env Vars"
