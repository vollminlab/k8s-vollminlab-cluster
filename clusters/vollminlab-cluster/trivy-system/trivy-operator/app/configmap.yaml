apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-operator-values
  namespace: trivy-system
  labels:
    app: trivy-operator
    env: production
    category: security
data:
  values.yaml: |
    excludeNamespaces: "actions-runner-system,arc-controller"

    operator:
      sbomReport:
        enabled: false
      scanJobsConcurrentLimit: 1
      # scanJobTolerations MUST live under operator: — in the trivy-operator
      # chart this key is operator.scanJobTolerations. A top-level
      # scanJobTolerations is silently dropped by Helm, so scan pods get no
      # tolerations and cannot schedule onto the tainted CP/DMZ nodes. With the
      # 4 general workers CPU-request-saturated, that produced FailedScheduling
      # -> BackoffLimitExceeded. (nodeCollector is a genuine top-level block.)
      scanJobTolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: dmz
          operator: Equal
          value: "true"
          effect: NoSchedule
      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          cpu: 500m
          memory: 768Mi

    trivy:
      ignoreUnfixed: true
      # Use an in-memory analysis cache for scan jobs. Trivy >=0.66 added a
      # lock timeout on the filesystem (BoltDB) cache; pods whose containers
      # share an image (e.g. longhorn-driver-deployer's init + main container
      # both run longhorn-manager) launch concurrent scans against one shared
      # cache emptyDir and deadlock on the lock -> BackoffLimitExceeded. The
      # memory backend has no on-disk lock, so concurrent same-image scans
      # succeed. Requires trivy >=0.68.1 (chart 0.34.0 default is 0.72.0).
      configFile:
        cache:
          backend: memory
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

    nodeCollector:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: dmz
          operator: Equal
          value: "true"
          effect: NoSchedule

    serviceMonitor:
      enabled: true
