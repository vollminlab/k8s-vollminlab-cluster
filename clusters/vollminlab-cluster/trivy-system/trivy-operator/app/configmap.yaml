apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-operator-values
  namespace: trivy-system
  labels:
    app: trivy-operator
    env: production
    category: security
data:
  values.yaml: |
    operator:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    trivy:
      ignoreUnfixed: true
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    serviceMonitor:
      enabled: true
