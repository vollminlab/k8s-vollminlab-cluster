apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dmz
  namespace: flux-system
  labels:
    app: dmz
    env: production
    category: gaming
spec:
  interval: 5m
  path: ./clusters/vollminlab-cluster/dmz
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
  dependsOn:
    - name: external-secrets
