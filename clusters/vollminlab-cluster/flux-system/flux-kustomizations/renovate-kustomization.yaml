apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: renovate
  namespace: flux-system
  labels:
    app: renovate
    env: production
    category: apps
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/renovate
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: sealed-secrets
    - name: external-secrets
  timeout: 2m
