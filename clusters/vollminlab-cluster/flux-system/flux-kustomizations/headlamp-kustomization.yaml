apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: headlamp
  namespace: flux-system
  labels:
    app: headlamp
    env: production
    category: core
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/flux-system/headlamp/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: flux-system
  timeout: 2m
  dependsOn:
    - name: external-secrets
