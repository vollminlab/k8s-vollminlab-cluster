apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale-connector
  namespace: flux-system
  labels:
    app: tailscale-operator
    env: production
    category: networking
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/tailscale-connector
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: tailscale
  timeout: 5m
  dependsOn:
    - name: tailscale
