apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns
  namespace: flux-system
  labels:
    app: external-dns
    env: production
    category: networking
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/external-dns
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: external-dns
  timeout: 2m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: external-dns
      namespace: external-dns
  dependsOn:
    - name: external-secrets
