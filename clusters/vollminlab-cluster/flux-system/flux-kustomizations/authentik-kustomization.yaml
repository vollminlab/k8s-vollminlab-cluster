apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik
  namespace: flux-system
  labels:
    app: authentik
    env: production
    category: security
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/authentik
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cnpg-system
    - name: external-secrets
