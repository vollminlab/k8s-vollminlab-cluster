apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shlink
  namespace: flux-system
  labels:
    app: shlink
    env: production
    category: apps
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/shlink
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 10m
  dependsOn:
    - name: cnpg-system
    - name: external-secrets
    - name: sealed-secrets
