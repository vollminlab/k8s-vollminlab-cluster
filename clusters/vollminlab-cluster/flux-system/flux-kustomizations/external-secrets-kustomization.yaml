apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: flux-system
  labels:
    app: external-secrets
    env: production
    category: security
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/external-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: external-secrets
  timeout: 5m
  dependsOn:
    - name: 1password
