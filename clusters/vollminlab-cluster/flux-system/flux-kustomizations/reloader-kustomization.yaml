apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: reloader
  namespace: flux-system
  labels:
    app: reloader
    env: production
    category: core
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/reloader
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: reloader
  timeout: 5m
  dependsOn:
    - name: sealed-secrets
