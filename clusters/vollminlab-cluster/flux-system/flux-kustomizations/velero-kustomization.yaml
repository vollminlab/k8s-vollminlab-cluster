apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero
  namespace: flux-system
  labels:
    app: velero
    env: production
    category: storage
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/velero
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 10m
  dependsOn:
    - name: minio
    - name: external-secrets
    - name: sealed-secrets
