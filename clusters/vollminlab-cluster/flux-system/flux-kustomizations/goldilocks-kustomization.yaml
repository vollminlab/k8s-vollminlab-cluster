apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: goldilocks
  namespace: flux-system
  labels:
    app: goldilocks
    env: production
    category: observability
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/goldilocks
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: goldilocks
  timeout: 5m
  dependsOn:
    - name: sealed-secrets
