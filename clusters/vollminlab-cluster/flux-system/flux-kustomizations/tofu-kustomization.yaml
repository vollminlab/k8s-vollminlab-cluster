apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tofu
  namespace: flux-system
  labels:
    app: tofu-controller
    env: production
    category: core
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/tofu
  prune: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: external-secrets
