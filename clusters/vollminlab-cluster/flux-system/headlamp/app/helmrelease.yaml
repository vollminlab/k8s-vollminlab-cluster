apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
  labels:
    app: headlamp
    env: production
    category: core
spec:
  interval: 5m
  releaseName: headlamp
  chart:
    spec:
      chart: headlamp
      version: 0.43.0
      sourceRef:
        kind: HelmRepository
        name: headlamp-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: headlamp-values
      valuesKey: values.yaml
