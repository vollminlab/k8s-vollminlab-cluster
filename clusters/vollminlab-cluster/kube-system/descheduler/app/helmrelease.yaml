apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: kube-system
  labels:
    app: descheduler
    env: production
    category: core
spec:
  interval: 10m
  chart:
    spec:
      chart: descheduler
      version: "0.36.0"
      sourceRef:
        kind: HelmRepository
        name: descheduler-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: descheduler-values
      valuesKey: values.yaml
