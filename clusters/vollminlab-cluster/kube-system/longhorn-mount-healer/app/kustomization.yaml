apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: longhorn-mount-healer
resources:
  - rbac.yaml
  - cronjob.yaml
configMapGenerator:
  - name: longhorn-mount-healer-script
    files:
      - heal.sh
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app: longhorn-mount-healer
    env: production
    category: storage
