apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: smb-csi-driver
  namespace: kube-system
  labels:
    app: smb-csi-driver
    env: production
    category: storage
spec:
  interval: 5m
  chart:
    spec:
      chart: csi-driver-smb
      version: 1.20.3
      sourceRef:
        kind: HelmRepository
        name: smb-csi-driver-repo
        namespace: flux-system
  releaseName: smb-csi-driver
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: smb-csi-driver-values
      valuesKey: values.yaml
