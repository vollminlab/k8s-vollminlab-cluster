---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: cnpg-system
  labels:
    app: cnpg
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: cnpg-system
  labels:
    app: cnpg
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow kube-apiserver (CP nodes) to call CNPG admission webhook.
# Service port is 443 but container (webhook-server) listens on 9443 — NetworkPolicy
# is evaluated post-DNAT at the pod interface, so container port must be used.
#
# ipBlock is NOT used here even though only CP nodes call the webhook. Calico IPIP
# encapsulation causes the kernel to evaluate rp_filter on the tunl0 interface before
# nftables chains run; strict RPF (rp_filter=2) drops the decapsulated inner packet
# when the source IP's return route uses the physical NIC rather than tunl0. This
# silently kills all host→pod ipBlock rules for cross-node traffic. Open from: [] is
# safe because the webhook is TLS-authenticated and kube-apiserver is the only caller.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-ingress
  namespace: cnpg-system
  labels:
    app: cnpg
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 9443
---
# Allow Prometheus scraping from monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: cnpg-system
  labels:
    app: cnpg
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
---
# Allow egress to Kubernetes API server (operator watches/manages CRDs cluster-wide)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-api-egress
  namespace: cnpg-system
  labels:
    app: cnpg
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 6443
---
# Allow external HTTPS egress (operator update checks)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: cnpg-system
  labels:
    app: cnpg
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
---
# Allow CNPG operator to reach instance manager status API (port 8000) on database
# pods in any namespace (authentik, harbor, mediastack, shlink, etc.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-instance-status-egress
  namespace: cnpg-system
  labels:
    app: cnpg
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
