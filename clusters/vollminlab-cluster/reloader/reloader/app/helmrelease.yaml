apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
  labels:
    app: reloader
    env: production
    category: core
spec:
  interval: 10m
  releaseName: reloader
  chart:
    spec:
      chart: reloader
      version: 2.2.12
      sourceRef:
        kind: HelmRepository
        name: reloader-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: reloader-values
      valuesKey: values.yaml
