apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-authentik
  namespace: authentik
  labels:
    app: cloudflared-authentik
    env: production
    category: networking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared-authentik
  template:
    metadata:
      labels:
        app: cloudflared-authentik
        env: production
        category: networking
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.3.0
          args:
            - tunnel
            - --no-autoupdate
            # Force http2 (TCP) transport. The default `auto` protocol left this
            # pod stuck retrying QUIC with "timeout: no recent network activity"
            # on 3 of 4 edge connections (Cloudflare reported the tunnel degraded).
            # http2 avoids UDP/7844 entirely and is sufficient for HTTP forward-auth.
            - --protocol
            - http2
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-authentik-tunnel-credentials
                  key: tunnel-token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
