apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-authentik
  namespace: authentik
  labels:
    app: cloudflared-authentik
    env: production
    category: networking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared-authentik
  template:
    metadata:
      labels:
        app: cloudflared-authentik
        env: production
        category: networking
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.3.0
          args:
            - tunnel
            - --no-autoupdate
            # Pin http2 (TCP) transport. The real cause of the degraded tunnel
            # was the authentik egress NetworkPolicy blocking port 7844 (fixed in
            # allow-external-egress); http2 keeps the edge connections on TCP and
            # is sufficient for HTTP forward-auth — no UDP/QUIC path needed.
            - --protocol
            - http2
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-authentik-tunnel-credentials
                  key: tunnel-token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
