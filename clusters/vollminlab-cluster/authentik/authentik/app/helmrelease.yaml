apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
  labels:
    app: authentik
    env: production
    category: security
spec:
  interval: 5m
  chart:
    spec:
      chart: authentik
      version: "2026.5.3"
      sourceRef:
        kind: HelmRepository
        name: authentik-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: authentik-values
      valuesKey: values.yaml
    - kind: Secret
      name: authentik-credentials
      valuesKey: values.yaml
