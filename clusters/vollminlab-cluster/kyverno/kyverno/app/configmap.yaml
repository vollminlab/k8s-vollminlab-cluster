apiVersion: v1
kind: ConfigMap
metadata:
  name: kyverno-values
  namespace: kyverno
  labels:
    app: kyverno
    env: production
    category: security
  annotations:
    meta.helm.sh/release-name: kyverno
    meta.helm.sh/release-namespace: kyverno
data:
  values.yaml: |
    podLabels:
      app: kyverno
      env: production
      category: security

    labels:
      app: kyverno
      env: production
      category: security

    admissionController:
      labels:
        app: kyverno-admission-controller
        env: production
        category: security
      podLabels:
        app: kyverno-admission-controller
        env: production
        category: security
      replicas: 3
      priorityClassName: system-cluster-critical
      failurePolicy: Ignore
      container:
        extraArgs:
          webhookTimeout: "30"
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kyverno
              - kube-system
              - flux-system
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      service:
        ports:
          - name: https
            port: 443
            targetPort: 9443

    validatingWebhookConfiguration:
      failurePolicy: Ignore
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kyverno
              - kube-system
              - flux-system

    mutatingWebhookConfiguration:
      failurePolicy: Ignore
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kyverno
              - kube-system
              - flux-system

    backgroundController:
      rbac:
        clusterRole:
          extraResources:
            - apiGroups: ["apps"]
              resources: ["deployments", "statefulsets", "daemonsets"]
              verbs: ["get", "list", "watch", "patch", "update"]
      labels:
        app: kyverno-background-controller
        env: production
        category: security
      podLabels:
        app: kyverno-background-controller
        env: production
        category: security
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

    cleanupController:
      # Disabled: cleanup controller scans all CRDs including Calico tiered
      # policy CRDs (globalnetworkpolicies.projectcalico.org) which Calico's
      # webhook rejects for non-Enterprise users. Kyverno's resourceFilters
      # do not apply to the cleanup controller, and it has no exclude mechanism.
      # Re-enable when TTL policies are needed; check if a newer Kyverno version
      # resolves the Calico webhook conflict first.
      enabled: false
      labels:
        app: kyverno-cleanup-controller
        env: production
        category: security
      podLabels:
        app: kyverno-cleanup-controller
        env: production
        category: security
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

    reportsController:
      featuresOverride:
        backgroundScan:
          # Let the reports controller honor config.resourceFilters so it does
          # not list deprecated served CRD versions during background scans.
          skipResourceFilters: false
      labels:
        app: kyverno-reports-controller
        env: production
        category: security
      podLabels:
        app: kyverno-reports-controller
        env: production
        category: security
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    config:
      resourceFilters:
        # Calico / Tigera CRDs — reports controller SA has no RBAC for these
        - '[GlobalNetworkPolicy,*,*]'
        - '[NetworkPolicy,*,*]'
        - '[Tier,*,*]'
        - '[StagedGlobalNetworkPolicy,*,*]'
        - '[StagedNetworkPolicy,*,*]'
        - '[StagedKubernetesNetworkPolicy,*,*]'
        - '[GlobalNetworkSet,*,*]'
        - '[BGPPeer,*,*]'
        - '[BlockAffinity,*,*]'
        - '[ClusterInformation,*,*]'
        - '[FelixConfiguration,*,*]'
        - '[HostEndpoint,*,*]'
        - '[IPAMHandle,*,*]'
        - '[IPPool,*,*]'
        - '[IPReservation,*,*]'
        - '[KubeControllersConfiguration,*,*]'
        - '[Installation,*,*]'
        - '[TigeraStatus,*,*]'
        # Deprecated Kyverno / Flux CRDs — removed in newer API versions
        - '[Alert,*,*]'
        - '[CleanupPolicy,*,*]'
        - '[ClusterCleanupPolicy,*,*]'
        - '[GlobalContextEntry,*,*]'
        - '[ImageValidatingPolicy,*,*]'
        - '[PolicyException,*,*]'
        - '[ValidatingPolicy,*,*]'
        - '[DeletingPolicy,*,*]'
        # Longhorn internal CRDs — no policies target these
        - '[BackupBackingImage,*,*]'
        - '[Backup,*,*]'
        - '[EngineImage,*,*]'
        - '[Orphan,*,*]'
        - '[Setting,*,*]'
        - '[ShareManager,*,*]'
        - '[Snapshot,*,*]'
        - '[SupportBundle,*,*]'
        # MetalLB CRDs — no policies target these
        - '[BFDProfile,*,*]'
        - '[L2Advertisement,*,*]'
        # Prometheus Operator / Grafana Agent CRDs — no policies target these
        - '[Alertmanager,*,*]'
        - '[AlertmanagerConfig,*,*]'
        - '[ServiceMonitor,*,*]'
        - '[ThanosRuler,*,*]'
        - '[GrafanaAgent,*,*]'
        - '[MetricsInstance,*,*]'
        # CNPG CRDs — no policies target these
        - '[Database,*,*]'
        - '[ImageCatalog,*,*]'
        - '[Subscription,*,*]'
        # Velero CRDs — no policies target these
        - '[PodVolumeBackup,*,*]'
        # Kubernetes built-ins with no applicable policies
        - '[Secret,*,*]'
        - '[PodTemplate,*,*]'
        - '[ClusterRoleBinding,*,*]'
        - '[StorageClass,*,*]'
        - '[CSIStorageCapacity,*,*]'
        - '[CustomResourceDefinition,*,*]'
        - '[PriorityClass,*,*]'
        - '[RuntimeClass,*,*]'
        - '[Lease,*,*]'
        # Kubernetes 1.33 new networking types — Kyverno 1.18 returns 400 for unknown types,
        # which causes kube-apiserver to crash on startup when creating the default ServiceCIDR.
        # matchConditions below also excludes these at the apiserver level (belt-and-suspenders).
        - '[ServiceCIDR,*,*]'
        - '[IPAddress,*,*]'
      # namespaceSelector can't exclude cluster-scoped resources; CEL evaluated by apiserver before any Kyverno connection
      matchConditions:
        - name: exclude-auth-review-resources
          expression: "!(request.resource.resource in ['subjectaccessreviews', 'selfsubjectaccessreviews', 'selfsubjectrulesreviews', 'tokenreviews'])"
        - name: exclude-k8s133-network-resources
          expression: "!(request.resource.resource in ['servicecidrs', 'ipaddresses'])"

    serviceMonitor:
      enabled: true
