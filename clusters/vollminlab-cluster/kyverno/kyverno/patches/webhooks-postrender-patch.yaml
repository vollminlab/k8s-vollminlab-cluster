apiVersion: batch/v1
kind: CronJob
metadata:
  name: patch-kyverno-webhooks
  namespace: kyverno
spec:
  schedule: "*/5 * * * *"  # every 5 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: patch-kyverno-webhooks
            env: production
            category: security
        spec:
          restartPolicy: OnFailure
          serviceAccountName: kyverno-webhook-patch
          terminationGracePeriodSeconds: 10
          # Pod-level security context — required to satisfy PSS "restricted"
          # enforced on the kyverno namespace. alpine/kubectl defaults to root,
          # so pin a non-root uid explicitly.
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          nodeSelector:
            node-role.kubernetes.io/control-plane: ""
          containers:
            - name: kubectl
              image: docker.io/alpine/kubectl:1.33.4
              imagePullPolicy: Always
              # Container-level security context — PSS "restricted" requires
              # allowPrivilegeEscalation: false and all capabilities dropped.
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                # kubectl writes its discovery cache under $HOME; /root is not
                # writable as uid 1000, so redirect to a writable path.
                - name: HOME
                  value: /tmp
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  PATCH='[
                    {"op":"replace","path":"/webhooks/0/failurePolicy","value":"Ignore"},
                    {"op":"replace","path":"/webhooks/0/namespaceSelector","value":{
                      "matchExpressions":[{
                        "key":"kubernetes.io/metadata.name",
                        "operator":"NotIn",
                        "values":["kyverno","kube-system","flux-system"]
                      }]
                    }}
                  ]'

                  # Function to patch webhook with error handling
                  patch_webhook() {
                    local webhook_type=$1
                    local webhook_name=$2
                    echo "Patching $webhook_type $webhook_name..."

                    kubectl patch "$webhook_type" "$webhook_name" \
                      --type='json' -p="$PATCH"

                    if [ $? -eq 0 ]; then
                      echo "Successfully patched $webhook_name"
                    else
                      echo "Failed to patch $webhook_name"
                      exit 1
                    fi
                  }

                  # Patch all Kyverno validating webhooks
                  for name in $(kubectl get validatingwebhookconfigurations \
                      -l webhook.kyverno.io/managed-by=kyverno -o name 2>/dev/null); do
                    patch_webhook "validatingwebhookconfiguration" "${name#*/}"
                  done

                  # Patch all Kyverno mutating webhooks
                  for name in $(kubectl get mutatingwebhookconfigurations \
                      -l webhook.kyverno.io/managed-by=kyverno -o name 2>/dev/null); do
                    patch_webhook "mutatingwebhookconfiguration" "${name#*/}"
                  done

                  echo "All webhooks patched successfully"
