apiVersion: v1
kind: ConfigMap
metadata:
  name: velero-values
  namespace: velero
  labels:
    app: velero
    env: production
    category: storage
data:
  values.yaml: |
    podLabels:
      app: velero
      env: production
      category: storage

    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 512Mi

    # AWS plugin provides S3-compatible support for both MinIO and Backblaze B2
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins

    # CSI snapshots disabled — using kopia file-system backup instead
    # Prevents chart from creating an empty VolumeSnapshotLocation
    snapshotsEnabled: false

    # Per-BSL credentials are used; no global credentials secret needed
    credentials:
      useSecret: false

    repositoryMaintenanceJob:
      repositoryConfigData:
        global:
          keepLatestMaintenanceJobs: 3
          podResources:
            cpuRequest: "50m"
            cpuLimit: "200m"
            memoryRequest: "128Mi"
            memoryLimit: "256Mi"

    configuration:
      # Use kopia file-system backup for PVC data
      defaultVolumesToFsBackup: true

      # Validate BSLs and sync backup list hourly instead of default 1 minute
      # Prevents excessive Class C API calls against Backblaze B2
      storeValidationFrequency: 1h
      backupSyncPeriod: 1h

      backupStorageLocation:
        # Primary: in-cluster MinIO (fast restores, no egress cost)
        - name: minio
          provider: aws
          bucket: velero
          default: true
          config:
            region: us-east-1
            s3ForcePathStyle: "true"
            s3Url: "http://minio.minio.svc.cluster.local:9000"
          credential:
            name: velero-minio-credentials
            key: cloud
        # Secondary: Backblaze B2 (off-site DR — use if MinIO is unavailable)
        - name: b2
          provider: aws
          bucket: vollminlab-k8s-backups
          config:
            region: us-west-000
            s3Url: "https://s3.us-west-000.backblazeb2.com"
            s3ForcePathStyle: "true"
          credential:
            name: velero-b2-credentials
            key: cloud

    # node-agent DaemonSet runs kopia on every node for file-system PVC backups
    deployNodeAgent: true

    nodeAgent:
      podLabels:
        app: velero-node-agent
        env: production
        category: storage
      tolerations:
        - key: dmz
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      nodeAgentPodMonitor:
        enabled: true

    schedules:
      daily-full:
        disabled: false
        schedule: "0 2 * * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: 336h
          storageLocation: minio
          defaultVolumesToFsBackup: true
          excludedNamespaces:
            - kyverno
            - longhorn-system
            - metallb-system
            - minio
            - monitoring
            - tofu
            - trivy-system
            - velero
          resourcePolicy:
            kind: ConfigMap
            name: velero-skip-smb-policy
      daily-b2:
        disabled: false
        schedule: "0 4 * * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: 2160h
          storageLocation: b2
          defaultVolumesToFsBackup: true
          excludedNamespaces:
            - kyverno
            - longhorn-system
            - metallb-system
            - minio
            - monitoring
            - tofu
            - trivy-system
            - velero
          resourcePolicy:
            kind: ConfigMap
            name: velero-skip-smb-policy
      monthly-b2:
        disabled: false
        schedule: "0 6 1 * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: 8760h
          storageLocation: b2
          defaultVolumesToFsBackup: true
          excludedNamespaces:
            - kyverno
            - longhorn-system
            - metallb-system
            - minio
            - monitoring
            - tofu
            - trivy-system
            - velero
          resourcePolicy:
            kind: ConfigMap
            name: velero-skip-smb-policy
