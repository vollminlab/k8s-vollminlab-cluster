apiVersion: v1
kind: ConfigMap
metadata:
  name: velero-values
  namespace: velero
  labels:
    app: velero
    env: production
    category: storage
data:
  values.yaml: |
    podLabels:
      app: velero
      env: production
      category: storage

    resources:
      requests:
        # VPA target/upperBound ~11m; server is idle between backup runs. Request
        # right-sized 500m→100m so the scheduler stops reserving idle cores on the
        # general workers. Limit unchanged — bursts during backups still allowed.
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1500Mi

    # AWS plugin provides S3-compatible support for both MinIO and Backblaze B2
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins

    # CSI snapshots disabled — using kopia file-system backup instead
    # Prevents chart from creating an empty VolumeSnapshotLocation
    snapshotsEnabled: false

    # Per-BSL credentials are used; no global credentials secret needed
    credentials:
      useSecret: false

    repositoryMaintenanceJob:
      repositoryConfigData:
        global:
          keepLatestMaintenanceJobs: 3
          podResources:
            cpuRequest: "50m"
            cpuLimit: "200m"
            memoryRequest: "128Mi"
            memoryLimit: "256Mi"

    configuration:
      # Use kopia file-system backup for PVC data
      defaultVolumesToFsBackup: true

      # Validate BSLs and sync backup list hourly instead of default 1 minute
      # Prevents excessive Class C API calls against Backblaze B2
      storeValidationFrequency: 1h
      backupSyncPeriod: 1h

      # Force-fail PVBs stuck in InProgress/Prepared after 30 minutes.
      # Without this, the node-agent's gRPC data path can get stuck silently and
      # block all PVBs on the affected node indefinitely across multiple backup runs.
      podVolumeOperationTimeout: 30m

      # BackupStorageLocations MUST stay nested under configuration: — the velero
      # chart reads configuration.backupStorageLocation. If this drifts out (e.g.
      # displaced by an inserted sibling block), the chart synthesizes an invalid
      # "default" BSL with no provider and every helm upgrade fails. (Regression
      # from PR #790 left it under affinity: and broke velero upgrades for days.)
      backupStorageLocation:
        # Primary: in-cluster MinIO (fast restores, no egress cost)
        - name: minio
          provider: aws
          bucket: velero
          default: true
          config:
            region: us-east-1
            s3ForcePathStyle: "true"
            s3Url: "http://minio.minio.svc.cluster.local:9000"
          credential:
            name: velero-minio-credentials
            key: cloud
        # Secondary: Backblaze B2 (off-site DR — use if MinIO is unavailable)
        - name: b2
          provider: aws
          bucket: vollminlab-k8s-backups
          config:
            region: us-west-000
            s3Url: "https://s3.us-west-000.backblazeb2.com"
            s3ForcePathStyle: "true"
          credential:
            name: velero-b2-credentials
            key: cloud

    # Prefer not to land on the same node as media stack workloads.
    # The Velero pod generates significant API/CPU load during backup runs, which
    # interferes with the node-agent's gRPC data path initialization on that node.
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: category
                    operator: In
                    values:
                      - media
              topologyKey: kubernetes.io/hostname

    # node-agent DaemonSet runs kopia on every node for file-system PVC backups
    deployNodeAgent: true

    nodeAgent:
      podLabels:
        app: velero-node-agent
        env: production
        category: storage
      tolerations:
        - key: dmz
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          # VPA target ~15m; node-agent idles except during kopia FSB. Request
          # 100m→50m (DaemonSet ×6). Limit unchanged so backups still burst.
          cpu: 50m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      nodeAgentPodMonitor:
        enabled: true

    schedules:
      daily-full:
        disabled: false
        schedule: "0 3 * * *"
        useOwnerReferencesInBackup: false
        template:
          # Local MinIO copy is a fast-restore CACHE, not the retention tier: the same
          # data lands in B2 daily (daily-b2, 90d) and monthly (monthly-b2, 365d), only
          # ~1h behind. 96h (4 days) covers a long-weekend "noticed it Monday" restore at
          # LAN speed while keeping steady-state headroom on the 100Gi MinIO volume.
          # Anything older is rare and served from B2. (Was 168h; trimmed 2026-07-02.)
          ttl: 96h
          storageLocation: minio
          defaultVolumesToFsBackup: true
          excludedNamespaces:
            - kyverno
            - longhorn-system
            - metallb-system
            - minio
            - monitoring
            - tofu
            - trivy-system
            - velero
          resourcePolicy:
            kind: ConfigMap
            name: velero-skip-smb-policy
          # Skip VolSync's transient mover pods/PVCs (label app.kubernetes.io/created-by:
          # volsync). They are created then deleted mid-sync, so Velero hits "PVC not
          # found" -> benign errors -> PartiallyFailed. NotIn also keeps all unlabeled
          # resources (incl. the real app config PVCs), so actual data is still backed up.
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/created-by
                operator: NotIn
                values:
                  - volsync
      daily-b2:
        disabled: false
        schedule: "0 4 * * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: 2160h
          storageLocation: b2
          defaultVolumesToFsBackup: true
          excludedNamespaces:
            - kyverno
            - longhorn-system
            - metallb-system
            - minio
            - monitoring
            - tofu
            - trivy-system
            - velero
          resourcePolicy:
            kind: ConfigMap
            name: velero-skip-smb-policy
          # Skip VolSync's transient mover pods/PVCs (label app.kubernetes.io/created-by:
          # volsync). They are created then deleted mid-sync, so Velero hits "PVC not
          # found" -> benign errors -> PartiallyFailed. NotIn also keeps all unlabeled
          # resources (incl. the real app config PVCs), so actual data is still backed up.
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/created-by
                operator: NotIn
                values:
                  - volsync
      monthly-b2:
        disabled: false
        schedule: "0 6 1 * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: 8760h
          storageLocation: b2
          defaultVolumesToFsBackup: true
          excludedNamespaces:
            - kyverno
            - longhorn-system
            - metallb-system
            - minio
            - monitoring
            - tofu
            - trivy-system
            - velero
          resourcePolicy:
            kind: ConfigMap
            name: velero-skip-smb-policy
          # Skip VolSync's transient mover pods/PVCs (label app.kubernetes.io/created-by:
          # volsync). They are created then deleted mid-sync, so Velero hits "PVC not
          # found" -> benign errors -> PartiallyFailed. NotIn also keeps all unlabeled
          # resources (incl. the real app config PVCs), so actual data is still backed up.
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/created-by
                operator: NotIn
                values:
                  - volsync
      victoria-metrics-b2:
        disabled: false
        schedule: "0 5 * * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: 2160h
          storageLocation: b2
          defaultVolumesToFsBackup: true
          includedNamespaces:
            - monitoring
          labelSelector:
            matchLabels:
              app: victoria-metrics
