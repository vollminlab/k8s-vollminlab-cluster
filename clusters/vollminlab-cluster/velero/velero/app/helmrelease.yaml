apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
  labels:
    app: velero
    env: production
    category: storage
spec:
  interval: 10m
  chart:
    spec:
      chart: velero
      version: 12.0.2
      sourceRef:
        kind: HelmRepository
        name: velero-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: velero-values
