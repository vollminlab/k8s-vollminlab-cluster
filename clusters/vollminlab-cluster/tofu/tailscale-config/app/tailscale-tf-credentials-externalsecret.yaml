apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-tf-credentials
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: tailscale-tf-credentials
    creationPolicy: Owner
  data:
    - secretKey: tailscale_oauth_client_id
      remoteRef:
        key: "Tailscale Terraform API Key"
        property: username
    - secretKey: tailscale_oauth_client_secret
      remoteRef:
        key: "Tailscale Terraform API Key"
        property: credential
