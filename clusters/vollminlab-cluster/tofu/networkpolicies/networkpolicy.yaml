---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow tofu-controller pods to communicate (runner↔agent, source-controller fetch)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Allow Flux source-controller to deliver artifacts to tofu-controller (port 9090)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-flux-source-controller
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flux-system
      ports:
        - protocol: TCP
          port: 9090
---
# Allow Prometheus scraping from monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
---
# Allow egress to Kubernetes API server (tofu-controller manages cluster resources)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-api-egress
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 6443
---
# Allow egress to MinIO for Terraform state backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-minio-egress
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio
      ports:
        - protocol: TCP
          port: 9000
---
# Allow external HTTPS egress (Terraform provider downloads, API calls to
# Authentik/Cloudflare/B2 on real :443). NOTE: this does NOT cover Harbor —
# Harbor's LoadBalancer remaps 443->8443, and egress policy is evaluated
# post-DNAT, so the harbor provider needs the dedicated rule below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
---
# Allow egress to the *arr apps in mediastack so the radarr/sonarr/readarr/
# prowlarr Terraform providers can reach each app's HTTP API. The apps serve
# plain HTTP on their own ports (not 443), so allow-https-egress doesn't cover
# them. Ports are the container ports (== service targetPort for every arr app).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mediastack-arr-egress
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mediastack
      ports:
        - protocol: TCP
          port: 7878  # radarr
        - protocol: TCP
          port: 8989  # sonarr
        - protocol: TCP
          port: 8787  # readarr
        - protocol: TCP
          port: 9696  # prowlarr
---
# Allow egress to Harbor so the harbor-config Terraform provider can reach the
# Harbor API. The provider targets https://harbor.vollminlab.com (LoadBalancer
# VIP 192.168.152.245:443), but Harbor's LB remaps 443 -> container port 8443.
# Egress policy is evaluated post-DNAT at the pod interface, so the effective
# destination port is 8443, NOT 443 — allow-https-egress (443 only) never
# matches. This is the egress side of the container-port-vs-service-port trap
# documented in .claude/rules/networkpolicy.md.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-harbor-egress
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: security
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: harbor
      ports:
        - protocol: TCP
          port: 8443  # harbor-nginx HTTPS container port (svc 443 -> 8443)
