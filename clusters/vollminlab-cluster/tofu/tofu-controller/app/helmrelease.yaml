apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: tofu
  labels:
    app: tofu-controller
    env: production
    category: core
spec:
  interval: 5m
  chart:
    spec:
      chart: tofu-controller
      version: "0.16.4"
      sourceRef:
        kind: HelmRepository
        name: tofu-controller-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: tofu-controller-values
      valuesKey: values.yaml
