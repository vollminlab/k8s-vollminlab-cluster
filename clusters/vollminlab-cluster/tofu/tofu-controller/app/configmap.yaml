apiVersion: v1
kind: ConfigMap
metadata:
  name: tofu-controller-values
  namespace: tofu
  labels:
    app: tofu-controller
    env: production
    category: core
data:
  values.yaml: |
    replicaCount: 1
    allowCrossNamespaceRefs: true

    podLabels:
      app: tofu-controller
      env: production
      category: core

    resources:
      requests:
        # VPA target ~15m; controller idles between reconciles (runners do the work).
        # Request 200m→75m. Limit unchanged (1000m) for reconcile bursts.
        cpu: 75m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

    runner:
      serviceAccount:
        create: true
        name: tf-runner
      podLabels:
        app: tf-runner
        env: production
        category: core
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
