apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tofu-minio-credentials
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: tofu-minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: access_key
      remoteRef:
        key: "Tofu MinIO User"
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: "Tofu MinIO User"
        property: secret_key
