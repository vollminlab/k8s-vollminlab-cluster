apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: portainer-tf-credentials
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: portainer-tf-credentials
    creationPolicy: Owner
  data:
    - secretKey: portainer_client_secret
      remoteRef:
        key: "Portainer Terraform Credentials"
        property: client_secret
    - secretKey: portainer_password
      remoteRef:
        key: "Portainer Terraform Credentials"
        property: portainer_password
