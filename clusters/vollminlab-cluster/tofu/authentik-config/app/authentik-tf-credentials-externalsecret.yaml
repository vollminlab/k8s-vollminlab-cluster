apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-tf-credentials
  namespace: tofu
  labels:
    app: tofu
    env: production
    category: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: authentik-tf-credentials
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: "Authentik Terraform API Token"
        property: password
