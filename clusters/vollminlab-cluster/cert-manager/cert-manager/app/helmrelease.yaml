apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
  labels:
    app: cert-manager
    env: production
    category: security
spec:
  interval: 5m
  chart:
    spec:
      chart: cert-manager
      version: v1.21.0
      sourceRef:
        kind: HelmRepository
        name: cert-manager-repo
        namespace: flux-system
  releaseName: cert-manager
  install:
    createNamespace: false
    crds: Skip
  upgrade:
    crds: Skip
  valuesFrom:
    - kind: ConfigMap
      name: cert-manager-values
      valuesKey: values.yaml
